<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Смена пароля</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap"
          rel="stylesheet">
</head>
<body>

<header class="header">
    <div class="header__container">
        <nav class="header__nav">
            <img src="images/logo.svg" alt="" class="header__svg">
        </nav>
    </div>
</header>

<div class="wrapper">

    <form id="newPasswordForm">

        <h1>Новый пароль</h1>

        <div class="input-box">
            <input
                type="email"
                name="email"
                placeholder="E-mail"
                required
            >
        </div>

        <div class="input-box">
            <input
                type="number"
                name="code"
                placeholder="Код подтверждения"
                required
            >
        </div>

        <div class="input-box">
            <input
                type="password"
                name="password"
                placeholder="Новый пароль (мин. 8 символов, хотя бы 1 буква)"
                required
            >
        </div>

        <div class="input-box">
            <input
                type="password"
                name="password_repeat"
                placeholder="Повторите пароль"
                required
            >
        </div>

        <button type="submit" class="btn">
            Сменить пароль
        </button>

    </form>

</div>

<script>

const savedEmail =
    localStorage.getItem('reset_email');

if(savedEmail){
    document.querySelector(
        'input[name="email"]'
    ).value = savedEmail;
}

document.getElementById('newPasswordForm')
.addEventListener('submit', async function(e){

    e.preventDefault();

    const email = this.email.value;
    const code = parseInt(this.code.value);
    const password = this.password.value;
    const repeat = this.password_repeat.value;

    if(password !== repeat){
        alert('Пароли не совпадают');
        return;
    }

    if(password.length < 8){
        alert('Пароль должен быть минимум 8 символов');
        return;
    }

    if (!/[a-zA-Zа-яА-Я]/.test(password)) {
        alert('Пароль должен содержать хотя бы одну букву');
        return;
    }

    try{
        const response = await fetch('/new_password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, code, new_password: password })
        });
        const result = await response.json();
        if(response.ok){
            alert('Пароль успешно изменён');
            localStorage.removeItem(
                'reset_email'
            );
            window.location.href =
                '/vhod/vhod.html';
        }else{
            alert(result.detail);
        }

    }catch(err){
        alert('Ошибка сети');
    }

});
</script>

</body>
</html>
