<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Восстановление пароля</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap"
          rel="stylesheet">
</head>
<body>

<header class="header">
    <div class="header__container">
        <nav class="header__nav">
            <img src="images/logo.svg" alt="" class="header__svg">
        </nav>
    </div>
</header>

<div class="wrapper">
    <form id="forgotForm">
        <h1>Восстановление пароля</h1>
        <p class="description">
            Введите адрес электронной почты. Мы отправим код подтверждения.
        </p>
        <div class="input-box">
            <input type="email" name="email" placeholder="E-mail" required>
        </div>
        <button type="submit" class="btn">Отправить код</button>
        <div id="message"></div>
        <div class="register-link">
            <a href="vhod/vhod.html">Вернуться ко входу</a>
        </div>
    </form>
</div>

<script>
document.getElementById('forgotForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const email = this.email.value;
    try {
        const response = await fetch('/forgot_password?email=' + encodeURIComponent(email), { method: 'POST' });
        const result = await response.json();
        if (response.ok) {
            localStorage.setItem('reset_email', email);
            document.getElementById('message').innerHTML = 'Код успешно отправлен на почту';
            setTimeout(() => { window.location.href = '/new_password.html'; }, 1500);
        } else {
            alert(result.detail);
        }
    } catch(err) {
        alert('Ошибка сети');
    }
});
</script>

</body>
</html>
