<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подписки</title>
    <link rel="stylesheet" href="style_main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap"
          rel="stylesheet">
</head>
<body>
<div class="profile-container">

    <h1>Управление подписками</h1>

    <div class="subscriptions-grid" id="teamsList"></div>
    <script>
            const khlTeams = [
                "СКА", "ЦСКА", "Ак Барс", "Динамо Москва", "Локомотив",
                "Спартак", "Трактор", "Авангард", "Металлург", "Салават Юлаев",
                "Северсталь", "Торпедо", "Нефтехимик", "Сибирь", "Витязь",
                "Амур", "Адмирал", "Барыс", "Куньлунь", "Лада",
                "Сочи", "Динамо Минск"
            ];

            const API = "";
            const token = localStorage.getItem("token");

            let chatId = localStorage.getItem("chat_id");
            let subscriptions = [];

            async function resolveChatId() {
                if (token) {
                    try {
                        const r = await fetch(`${API}/me`, {
                            headers: { "Authorization": `Bearer ${token}` }
                        });
                        if (r.ok) {
                            const user = await r.json();
                            chatId = user.chat_id;
                            localStorage.setItem("chat_id", chatId);
                            return;
                        }
                    } catch {}
                }
                if (!chatId) chatId = localStorage.getItem("chat_id");
            }

            let venues = [];

            async function loadSubscriptions() {
                await resolveChatId();
                if (!chatId) { render(); return; }
                try {
                    const headers = {};
                    if (token) headers["Authorization"] = `Bearer ${token}`;
                    const r = await fetch(`${API}/subscriptions/${chatId}`, { headers });
                    if (!r.ok) {
                        if (r.status === 401 || r.status === 404) {
                            localStorage.removeItem("token");
                            localStorage.removeItem("chat_id");
                            window.location.href = "vhod/vhod.html";
                            return;
                        }
                        render(); return;
                    }
                    const data = await r.json();
                    subscriptions = data.subscriptions || [];
                    venues = data.venues || [];
                    localStorage.setItem("subscriptions", JSON.stringify(subscriptions));
                    render();
                } catch { render(); }
            }

            const container = document.getElementById("teamsList");

            function render() {
                container.innerHTML = "";
                const heading = document.createElement("h2");
                heading.textContent = "Команды";
                container.appendChild(heading);
                khlTeams.forEach(team => {
                    const subscribed = subscriptions.includes(team.toLowerCase());
                    const card = document.createElement("div");
                    card.className = "subscription-card";
                    const span = document.createElement("span");
                    span.textContent = team;
                    card.appendChild(span);
                    const btn = document.createElement("button");
                    btn.className = "btn-small" + (subscribed ? " unsubscribe" : "");
                    btn.textContent = subscribed ? "Отписаться" : "Подписаться";
                    btn.dataset.team = team;
                    btn.addEventListener("click", function() {
                        toggleSubscription(this.dataset.team);
                    });
                    card.appendChild(btn);
                    container.appendChild(card);
                });
                if (venues.length) {
                    const vHeading = document.createElement("h2");
                    vHeading.textContent = "Стадионы";
                    vHeading.style.marginTop = "30px";
                    container.appendChild(vHeading);
                    venues.forEach(v => {
                        const parts = v.split(", ");
                        const display = parts.length === 2 ? parts[1] + " (" + parts[0] + ")" : v;
                        const card = document.createElement("div");
                        card.className = "subscription-card";
                        const span = document.createElement("span");
                        span.textContent = "\u{1F3DF} " + display;
                        card.appendChild(span);
                        const badge = document.createElement("span");
                        badge.className = "badge";
                        badge.textContent = "авто";
                        card.appendChild(badge);
                        container.appendChild(card);
                    });
                }
            }

            async function toggleSubscription(team) {
                await resolveChatId();
                if (!chatId) { alert("Авторизуйтесь"); return; }
                try {
                    const headers = { "Content-Type": "application/json" };
                    if (token) headers["Authorization"] = `Bearer ${token}`;
                    const r = await fetch(`${API}/subscription/toggle`, {
                        method: "POST",
                        headers,
                        body: JSON.stringify({ chat_id: parseInt(chatId), team_name: team })
                    });
                    const result = await r.json();
                    if (r.ok) {
                        await loadSubscriptions();
                    } else {
                        alert(result.message || "Ошибка");
                    }
                } catch (err) {
                    alert("Ошибка сети: " + err.message);
                }
            }

            loadSubscriptions();
        </script>
    <button class="btn"
            onclick="window.location.href='main.html'">
        Назад
    </button>

</div>
</body>
</html>
