name: Tests & QA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Additional QA check — Bandit (security lint)
        run: |
          bandit -c pyproject.toml -r Backend services -f txt 2>&1 || true

      - name: Run unit and integration tests with coverage
        run: |
          python -m pytest tests/ -v --cov=Backend --cov=services --cov-report=term --cov-report=xml --cov-config=.coveragerc

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
