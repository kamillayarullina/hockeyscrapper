<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Смена пароля</title>

    <link rel="stylesheet" href="style_pass.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap"
          rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="header__container">
            <nav class="header__nav">
                <img src="images/logo.svg" alt="" class="header__svg">
            </nav>
        </div>
    </header>

<div class="wrapper">

    <form id="newPasswordForm">

        <h1>Новый пароль</h1>

        <div class="input-box">
            <input
                type="email"
                name="email"
                placeholder="E-mail"
                required
            >
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24" >
<path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2m0 2v.51l-8 6.22-8-6.22V6zM4 18V9.04l7.39 5.74c.18.14.4.21.61.21s.43-.07.61-.21L20 9.03v8.96H4Z"></path>
</svg>
        </div>

        <div class="input-box">
            <input
                type="number"
                name="code"
                placeholder="Код подтверждения"
                required
            >
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24" >
<path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2M9 6c0-1.65 1.35-3 3-3s3 1.35 3 3v2H9zm9 14H6V10h12zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2"></path>
</svg>
        </div>

        <div class="input-box">
            <input
                type="password"
                name="password"
                placeholder="Новый пароль (мин. 8 символов, хотя бы 1 буква)"
                required
            >
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"  
fill="currentColor" viewBox="0 0 24 24" >
<path d="M6 22h12c1.1 0 2-.9 2-2v-9c0-1.1-.9-2-2-2h-1V7c0-2.76-2.24-5-5-5S7 4.24 7 7v2H6c-1.1 0-2 .9-2 2v9c0 1.1.9 2 2 2M9 7c0-1.65 1.35-3 3-3s3 1.35 3 3v2H9zm-3 4h12v9H6z"></path>
</svg>
            <svg class="toggle-password" data-target="password" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
</svg>
        </div>

        <div class="input-box">
            <input
                type="password"
                name="password_repeat"
                placeholder="Повторите пароль"
                required
            >
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"  
fill="currentColor" viewBox="0 0 24 24" >
<path d="M6 22h12c1.1 0 2-.9 2-2v-9c0-1.1-.9-2-2-2h-1V7c0-2.76-2.24-5-5-5S7 4.24 7 7v2H6c-1.1 0-2 .9-2 2v9c0 1.1.9 2 2 2M9 7c0-1.65 1.35-3 3-3s3 1.35 3 3v2H9zm-3 4h12v9H6z"></path>
</svg>
            <svg class="toggle-password" data-target="password_repeat" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
</svg>
        </div>

        <button type="submit" class="btn">
            Сменить пароль
        </button>
        <div id="message"></div>

        <div class="register-link">
            <p><a href="vhod/vhod.html">
                Вернуться ко входу
            </a></p>
        </div>
    </form>

</div>

<script>
document.querySelectorAll(".toggle-password").forEach(function(icon) {
    icon.addEventListener("click", function() {
        var input = document.querySelector("input[name='" + this.dataset.target + "']");
        if (input.type === "password") {
            input.type = "text";
            this.innerHTML = '<path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>';
        } else {
            input.type = "password";
            this.innerHTML = '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>';
        }
    });
});

const savedEmail =
    localStorage.getItem('reset_email');

const emailInput = document.querySelector('input[name="email"]');
if(savedEmail){
    emailInput.value = savedEmail;
    emailInput.readOnly = true;
}

document.getElementById('newPasswordForm')
.addEventListener('submit', async function(e){

    e.preventDefault();

    const msgDiv = document.getElementById('message');
    const btn = this.querySelector('.btn');
    const originalText = btn.textContent;

    const email = this.email.value;
    const code = parseInt(this.code.value);
    const password = this.password.value;
    const repeat = this.password_repeat.value;

    if(password !== repeat){
        msgDiv.innerHTML = 'Пароли не совпадают';
        return;
    }
    if(password.length < 8){
        msgDiv.innerHTML = 'Пароль должен быть минимум 8 символов';
        return;
    }
    if(!/[a-z]/.test(password)){
        msgDiv.innerHTML = 'Пароль должен содержать хотя бы одну строчную букву';
        return;
    }
    if(!/\d/.test(password)){
        msgDiv.innerHTML = 'Пароль должен содержать хотя бы одну цифру';
        return;
    }


    btn.disabled = true;
    btn.textContent = 'Смена...';
    msgDiv.innerHTML = '';

    try{
        const response = await fetch('/new_password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, code, new_password: password })
        });
        const result = await response.json();
        if(response.ok){
            msgDiv.innerHTML = 'Пароль успешно изменён! Перенаправление...';
            localStorage.removeItem(
                'reset_email'
            );
            setTimeout(() => {
                window.location.href = 'vhod/vhod.html';
            }, 2000);
        }else{
            msgDiv.innerHTML = result.detail || 'Ошибка';
            btn.disabled = false;
            btn.textContent = originalText;
        }

    }catch(err){
        msgDiv.innerHTML = 'Ошибка сети. Проверьте подключение.';
        btn.disabled = false;
        btn.textContent = originalText;
    }

});
</script>

</body>
</html>
