<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль</title>

    <link rel="stylesheet" href="style_main.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap"
          rel="stylesheet">
</head>
<body>
    <div class="profile-container">

        <h1>Профиль</h1>

        <div class="profile-header">

            <div class="profile-avatar">
                👤
            </div>

            <div class="profile-info">
                <div class="info-card">
                    <span>Имя пользователя</span>
                    <strong>Иван Иванов</strong>
                </div>

                <div class="info-card">
                    <span>Почта</span>
                    <strong>ivan@example.com</strong>
                </div>

                <div class="info-card">
                    <span>Telegram</span>
                    <strong>@ivanov</strong>
                </div>

                <button class="btn"
                        onclick="window.location.href='sub.html'">
                    Управление подписками
                </button>
            </div>

        </div>

        <div class="teams-section">

            <h2>Подписки</h2>

            <div class="teams-grid" id="myTeams"></div>
            <script>
                const teamsContainer =
                    document.getElementById("myTeams");

                const subscriptions =
                    JSON.parse(localStorage.getItem("subscriptions")) || [];

                if (subscriptions.length === 0) {
                    teamsContainer.innerHTML =
                        "<p>Вы пока не подписаны ни на одну команду.</p>";
                } else {
                    subscriptions.forEach(team => {
                        teamsContainer.innerHTML += `
                            <div class="team-card">
                                ${team}
                            </div>
                        `;
                    });
                }
            </script>

        </div>

    </div>
</body>
</html>
