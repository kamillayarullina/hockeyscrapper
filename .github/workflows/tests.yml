name: Tests & QA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Install Playwright Browsers with System Dependencies
        run: |
          playwright install chromium --with-deps

      - name: Run Additional QA Check — Dependency Security Audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --ignore-vuln GHSA-537c-gmf6-5ccf

      - name: Run Security Linter (Bandit)
        run: |
          bandit -r Backend services -ll -ii

      - name: Run unit, integration, and quality requirement tests (QRT) with coverage
        run: |
          python -m pytest tests/ -v --cov=Backend --cov-report=term --cov-report=xml --cov-config=.coveragerc

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
