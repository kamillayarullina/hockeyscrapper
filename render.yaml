services:
  - type: web
    name: hockeyscrapper-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn Backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hockeyscrapper-db
          property: connectionString
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false

  - type: worker
    name: hockeyscrapper-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m main --bot-only
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hockeyscrapper-db
          property: connectionString
      - key: BOT_TOKEN
        sync: false

databases:
  - name: hockeyscrapper-db
    databaseName: hockeyscrapper
    plan: free
