settings:
  default_interval_minutes: 30
  retry_attempts: 3
  retry_backoff_base: 2
  min_delay_seconds: 1.0
  max_delay_seconds: 3.0
  output_dir: "data"
  headless: true

  proxy:
    enabled: false

  # Настройки Telegram-бота (токен из .env)
  telegram:
    admin_chat_id: 8061310741

  # Email-уведомления админу (опционально)
  email:
    enabled: true
    smtp_server: "${EMAIL_SMTP_SERVER}"
    smtp_port: 587
    login: "${EMAIL_LOGIN}"
    password: "${EMAIL_PASSWORD}"
    to_email: "${EMAIL_TO}"

sites:
  # ───── АГРЕГАТОРЫ (проверенные источники) ─────
  - name: ticket_hockey
    url: https://ticket-hockey.ru/afisha/
    parser: club
    enabled: true
    interval_minutes: 30
    params:
      keywords:
        - "хоккей"
        - "кхл"
        - "цска"
        - "спартак"
        - "динамо"
        - "ска"
        - "авангард"
        - "ак барс"
        - "металлург"
        - "трактор"
        - "локомотив"
        - "сибирь"
        - "торпедо"
        - "лада"
        - "салават юлаев"
        - "витязь"
        - "северсталь"
        - "нефтехимик"
        - "амур"
        - "адмирал"
        - "куньлунь"
        - "барыс"
        - "сочи"
        - "автомобилист"
      timeout_ms: 30000

  - name: khl_ru
    url: https://khl.ru/tickets/
    parser: khl
    enabled: true
    interval_minutes: 30
    params:
      timeout_ms: 30000

  - name: yandex_afisha
    url: https://afisha.yandex.ru/moscow/sport?source=menu
    parser: yandex
    enabled: true
    interval_minutes: 30
    params:
      keywords:
        - "кхл"
        - "континентальная"
        - "цска"
        - "спартак"
        - "динамо"
        - "ска"
        - "авангард"
        - "ак барс"
        - "металлург"
        - "трактор"
        - "локомотив"
        - "сибирь"
        - "торпедо"
        - "лада"
        - "салават"
        - "витязь"
        - "северсталь"
        - "нефтехимик"
        - "амур"
        - "адмирал"
        - "куньлунь"
        - "барыс"
        - "сочи"
        - "автомобилист"
      timeout_ms: 30000

  # ───── ОФИЦИАЛЬНЫЕ САЙТЫ КЛУБОВ КХЛ ─────
  # Все включены. Если сайт использует личный кабинет / SPA / Яндекс Афишу,
  # ClubParser не сможет его спарсить — нужны доработки или wait_selector.
  #
  - name: cska
    url: https://tickets.cska-hockey.ru/
    parser: club_site
    enabled: true
    interval_minutes: 60
    params:
      keywords: ["цска", "армейцы"]
      wait_selector: ".event-card, .match-item, .ticket-item, .schedule-item, [class*=match], [class*=event], [class*=ticket]"
      timeout_ms: 30000

