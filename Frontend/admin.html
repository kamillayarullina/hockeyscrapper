<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ŠĐŠ+Š-ŠŹŠ--ŠŹŠ-Š-ŠŠŠŹTÌ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style_main.css">
    <style>
        body { align-items: flex-start; padding: 30px 20px; }
        .admin-container { width: min(1200px, 94vw); margin: 0 auto; background: rgba(255,255,255,0.92); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); border-radius: 28px; padding: 40px 42px 42px; box-shadow: 0 30px 70px rgba(13,57,140,0.12), 0 10px 30px rgba(0,0,0,0.04); animation: fadeUp 0.5s ease-out; }
        h1 { text-align: center; color: var(--darkblue); font-size: 36px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.4px; }
        .header-sub { text-align: center; color: var(--lidark); font-size: 15px; margin-bottom: 28px; display: block; }
        .tabs { display: flex; gap: 6px; margin-bottom: 24px; flex-wrap: wrap; justify-content: center; }
        .tab { padding: 10px 28px; background: transparent; border: 2px solid var(--darkblue); color: var(--lidark); cursor: pointer; border-radius: 40px; font-weight: 700; font-size: 14px; transition: all .2s; font-family: 'Nunito', sans-serif; }
        .tab:hover { background: var(--darkblue); color: #fff; }
        .tab.active { background: var(--darkblue); color: #fff; }
        .tab-content { display: none; animation: fadeIn .2s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .table-wrap { overflow-x: auto; margin-top: 4px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { text-align: left; padding: 14px 14px; color: var(--darkblue); font-weight: 800; font-size: 12px; text-transform: uppercase; letter-spacing: .5px; border-bottom: 2px solid #d4e0f0; }
        td { padding: 12px 14px; border-bottom: 1px solid #e8edf5; vertical-align: middle; color: #333; }
        tr:hover td { background: rgba(13,57,140,.04); }
        .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 12px; border-radius: 40px; font-size: 12px; font-weight: 700; }
        .badge-active { background: #e8f5e9; color: #2e7d32; }
        .badge-banned { background: #fbe9e7; color: #c62828; }
        .badge-yes { background: #e8f5e9; color: #2e7d32; }
        .badge-no { background: #fff3e0; color: #e65100; }
        .badge-enabled { background: #e8f5e9; color: #2e7d32; }
        .badge-disabled { background: #e0e7f0; color: #888; }
        .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 22px; border: none; border-radius: 40px; cursor: pointer; font-weight: 700; font-size: 13px; transition: all .2s; font-family: 'Nunito', sans-serif; }
        .btn-sm { font-size: 11px; padding: 5px 14px; border-radius: 40px; }
        .btn-primary { background: var(--darkblue); color: #fff; }
        .btn-primary:hover { opacity: .85; }
        .btn-danger { background: #c62828; color: #fff; }
        .btn-danger:hover { opacity: .85; }
        .btn-secondary { background: #e0e7f0; color: var(--darkblue); }
        .btn-secondary:hover { background: #d0d8e5; }
        .btn-success { background: #2e7d32; color: #fff; }
        .btn-success:hover { opacity: .85; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 14px; margin-bottom: 20px; }
        .card { background: white; border-radius: 20px; padding: 20px 14px; text-align: center; border: 2px solid #d4e0f0; transition: all .2s; }
        .card:hover { border-color: var(--darkblue); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(13,57,140,.1); }
        .card .num { font-size: 30px; font-weight: 800; color: var(--darkblue); display: block; }
        .card .label { font-size: 12px; color: var(--lidark); margin-top: 4px; font-weight: 600; }
        .form-row { display: flex; gap: 12px; margin: 14px 0; flex-wrap: wrap; align-items: end; }
        .form-row label { font-size: 13px; color: var(--lidark); display: block; margin-bottom: 4px; font-weight: 700; }
        .form-row input, .form-row select { padding: 10px 16px; border: 2px solid #d4e0f0; border-radius: 40px; color: #333; font-size: 14px; font-family: 'Nunito', sans-serif; transition: all .2s; background: white; }
        .form-row input:focus, .form-row select:focus { border-color: var(--darkblue); outline: none; box-shadow: 0 0 0 3px rgba(13,57,140,.1); }
        .msg { padding: 12px 18px; border-radius: 40px; margin: 12px 0; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; justify-content: center; }
        .msg-ok { background: #e8f5e9; color: #2e7d32; }
        .msg-err { background: #fbe9e7; color: #c62828; }
        .log-line { font-family: 'Courier New', monospace; font-size: 12px; padding: 5px 0; border-bottom: 1px solid #e8edf5; color: #555; }
        .log-line .level-ERROR { color: #c62828; font-weight: 700; }
        .log-line .level-WARNING { color: #e65100; }
        .inp { padding: 10px 16px; border: 2px solid #d4e0f0; border-radius: 40px; color: #333; font-size: 14px; font-family: 'Nunito', sans-serif; transition: all .2s; background: white; }
        .inp:focus { border-color: var(--darkblue); outline: none; box-shadow: 0 0 0 3px rgba(13,57,140,.1); }
        .subs-tag { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px 3px 8px; border-radius: 40px; font-size: 12px; font-weight: 700; margin: 2px 3px 2px 0; }
        .subs-tag-team { background: #e8f0fe; color: var(--darkblue); }
        .subs-tag .subs-date { color: var(--lidark); font-weight: 400; font-size: 11px; opacity: .7; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 1000; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: white; border-radius: 35px; padding: 35px; min-width: 380px; max-width: 440px; box-shadow: 0 20px 50px rgba(0,0,0,.2); animation: fadeIn .2s ease; }
        .modal h3 { text-align: center; color: var(--darkblue); font-size: 24px; margin-bottom: 24px; font-weight: 800; }
        .modal .form-group { margin-bottom: 18px; }
        .modal .form-group label { display: block; font-size: 13px; color: var(--lidark); margin-bottom: 6px; font-weight: 700; }
        .modal .form-group input { width: 100%; padding: 12px 18px; border: 2px solid #d4e0f0; border-radius: 40px; color: #333; font-size: 14px; font-family: 'Nunito', sans-serif; }
        .modal .form-group input:focus { border-color: var(--darkblue); outline: none; }
        .modal-actions { display: flex; gap: 10px; justify-content: center; margin-top: 28px; }
        .btn-cancel { background: #e0e7f0; color: var(--darkblue); font-family: 'Nunito', sans-serif; }
        .btn-cancel:hover { background: #d0d8e5; }
        .empty-state { text-align: center; padding: 30px 20px; color: var(--lidark); font-weight: 600; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #e8edf5; border-radius: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--lidark); border-radius: 3px; }
    </style>
</head>
<body>
<div class="admin-container">
    <h1>ŠßŠ-Š-ŠŠŠŹTÌ TĂŠŹTÀŠ-Š-ŠŹŠŠŠ-ŠŹTÏ</h1>
    <span class="header-sub">HockeyScrapper òÀÔ Š-Š+Š-ŠŹŠ-ŠŹTÁTÂTÀŠ-TÂŠŹŠ-Š-Š-TÏ ŠŹŠ-Š-ŠŠŠŹTÌ</span>
    <div class="tabs" id="tabs">
        <button class="tab active" data-tab="dashboard">ŠÔŠ-TÈŠ-Š-TÀŠ+</button>
        <button class="tab" data-tab="users">ŠßŠ-ŠŹTÌŠŹŠ-Š-Š-TÂŠŠŠŹŠŹ</button>
        <button class="tab" data-tab="proxies">ŠßTÀŠ-ŠŠTÁŠŹ</button>
        <button class="tab" data-tab="settings">ŠĘŠ-TÁTÂTÀŠ-ŠŠŠŠŠŹ</button>
        <button class="tab" data-tab="sites">ŠáŠ-ŠŠTÂTË</button>
        <button class="tab" data-tab="logs">ŠÛŠ-ŠŠŠŹ</button>
    </div>

    <div id="tab-dashboard" class="tab-content active"></div>
    <div id="tab-users" class="tab-content"></div>
    <div id="tab-proxies" class="tab-content"></div>
    <div id="tab-settings" class="tab-content"></div>
    <div id="tab-sites" class="tab-content"></div>
    <div id="tab-logs" class="tab-content"></div>
</div>

<div class="modal-overlay" id="subModal">
    <div class="modal">
        <h3>ŠÔŠ-Š-Š-Š-ŠŹTÂTÌ ŠŹŠ-Š+ŠŹŠŹTÁŠŠTĂ</h3>
        <div class="form-group">
            <label>ŠĘŠ-ŠŹŠ-Š-Š-ŠŹŠŠ ŠŠŠ-Š-Š-Š-Š+TË</label>
            <input id="subValue" placeholder="ŠĘŠ-ŠŹTÀŠŹŠ-ŠŠTÀ: ŠæŠáŠÚŠĐ">
        </div>
        <div class="modal-actions">
            <button class="btn btn-cancel" onclick="closeSubModal()">ŠȚTÂŠ-ŠŠŠ-Š-</button>
            <button class="btn btn-primary" onclick="saveSub()">ŠÔŠ-Š-Š-Š-ŠŹTÂTÌ</button>
        </div>
    </div>
</div>

<script>
const token = localStorage.getItem("token");
if (!token) { window.location.href = "/vhod/vhod.html"; }
const headers = { "Content-Type": "application/json", "Authorization": `Bearer ${token}` };

async function api(url, opts = {}) {
    const res = await fetch(url, { headers: { ...headers, ...opts.headers }, ...opts });
    if (res.status === 401) { localStorage.removeItem("token"); window.location.href = "/vhod/vhod.html"; }
    if (!res.ok) { const err = await res.json().catch(() => ({ detail: res.statusText })); throw new Error(err.detail || "ŠȚTÈŠŹŠ-ŠŠŠ-"); }
    return res.json();
}

// Admin check
(async () => {
    try {
        await api("/admin/check");
    } catch { window.location.href = "/vhod/vhod.html"; }
})();

// Tabs
document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        document.getElementById("tab-" + tab.dataset.tab).classList.add("active");
    });
});

// Dashboard
async function loadDashboard() {
    const data = await api("/admin/stats");
    const el = document.getElementById("tab-dashboard");
    el.innerHTML = `<div class="card-grid">
        <div class="card"><span class="num">${data.total_users}</span><span class="label">ŠÒTÁŠŠŠŠŠ- ŠŹŠ-ŠŹTÌŠŹŠ-Š-Š-TÂŠŠŠŹŠŠŠŠ</span></div>
        <div class="card"><span class="num">${data.active_users}</span><span class="label">ŠĐŠŠTÂŠŹŠ-Š-TËTĆ</span></div>
        <div class="card"><span class="num">${data.banned_users}</span><span class="label">ŠŚŠ-Š-ŠŹŠ-ŠŠŠŹTÀŠ-Š-Š-Š-Š-</span></div>
        <div class="card"><span class="num">${data.team_subs}</span><span class="label">ŠßŠ-Š+ŠŹŠŹTÁŠŠŠŹ Š-Š- ŠŠŠ-Š-Š-Š-Š+TË</span></div>
        <div class="card"><span class="num">${data.venue_subs}</span><span class="label">ŠßŠ-Š+ŠŹŠŹTÁŠŠŠŹ Š-Š- TÁTÂŠ-Š+ŠŹŠ-Š-TË</span></div>
        <div class="card"><span class="num">${data.matches}</span><span class="label">ŠÜŠ-TÂTÇŠŠŠŠ Š- Š-Š-ŠŹŠŠ</span></div>
        <div class="card"><span class="num">${data.proxies}</span><span class="label">ŠßTÀŠ-ŠŠTÁŠŹ</span></div>
    </div>`;
}

let _subChatId = null;

function openSubModal(chatId) {
    _subChatId = chatId;
    document.getElementById("subValue").value = "";
    document.getElementById("subModal").classList.add("active");
}

function closeSubModal() {
    document.getElementById("subModal").classList.remove("active");
    _subChatId = null;
}

async function saveSub() {
    const value = document.getElementById("subValue").value.trim();
    if (!value) return;
    await api(`/admin/users/${_subChatId}/subscriptions`, { method: "POST", body: JSON.stringify({ type: "team", value }) });
    closeSubModal();
    loadUsers();
}

// Users
async function loadUsers() {
    const users = await api("/admin/users");
    let html = `<div class="table-wrap"><table><thead><tr><th>ID</th><th>ŠŰŠ-TÏ</th><th>Email</th><th>Telegram</th><th>TG ŠŹTÀŠŹŠ-TÏŠŹŠ-Š-</th><th>ŠŚŠ-TÀŠŠŠŠŠŹTÁTÂTÀŠŹTÀŠ-Š-Š-Š-</th><th>ŠáTÂŠ-TÂTĂTÁ</th><th>ŠßŠ-Š+ŠŹŠŹTÁŠŠŠŹ</th><th>ŠÔŠŠŠŠTÁTÂŠ-ŠŹTÏ</th></tr></thead><tbody>`;
    if (!users.length) {
        html += `<tr><td colspan="9"><div class="empty-state">ŠßŠ-ŠŹTÌŠŹŠ-Š-Š-TÂŠŠŠŹŠŠŠŠ Š-ŠŠTÂ</div></td></tr>`;
    }
    for (const u of users) {
        const status = u.is_active ? '<span class="badge badge-active">Š-ŠŠTÂŠŹŠ-ŠŠŠ-</span>' : '<span class="badge badge-banned">ŠŹŠ-Š-ŠŹŠ-ŠŠŠŹTÀŠ-Š-Š-Š-</span>';
        const tgLinked = u.chat_id > 0 ? '<span class="badge badge-yes">ŠÔŠ-</span>' : '<span class="badge badge-no">ŠĘŠŠTÂ</span>';
        const regDate = u.registered_at ? new Date(u.registered_at).toLocaleDateString("ru-RU") : "òÀÔ";
        const subs = u.subscriptions.filter(s => s.type === "team").map(s => {
            const d = s.created_at ? new Date(s.created_at).toLocaleDateString("ru-RU") : "";
            return `<span class="subs-tag subs-tag-team">${s.value} ${d ? `<span class="subs-date">${d}</span>` : ""}</span>`;
        }).join(" ") || '<span style="color:#999;font-size:13px">òÀÔ</span>';
        html += `<tr>
            <td style="font-weight:800;color:var(--darkblue)">${u.chat_id}</td>
            <td>${u.username || '<span style="color:#999">òÀÔ</span>'}</td>
            <td>${u.email || '<span style="color:#999">òÀÔ</span>'}</td>
            <td>${u.telegram || '<span style="color:#999">òÀÔ</span>'}</td>
            <td>${tgLinked}</td>
            <td style="font-size:13px;color:#666">${regDate}</td>
            <td>${status}</td>
            <td style="max-width:220px">${subs}</td>
            <td>
                <div style="display:flex;gap:4px;flex-wrap:nowrap">
                    <button class="btn btn-sm btn-secondary" onclick="toggleBan(${u.chat_id})" title="${u.is_active ? "ŠŚŠ-Š-ŠŹŠ-ŠŠŠŹTÀŠ-Š-Š-TÂTÌ" : "ŠàŠ-ŠŹŠ-ŠŹŠ-ŠŠŠŹTÀŠ-Š-Š-TÂTÌ"}">${u.is_active ? "šßÔÒ" : "šßÔÓ"}</button>
                    <button class="btn btn-sm btn-primary" onclick="openSubModal(${u.chat_id})" title="ŠÔŠ-Š-Š-Š-ŠŹTÂTÌ ŠŹŠ-Š+ŠŹŠŹTÁŠŠTĂ">+</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteUser(${u.chat_id})" title="ŠăŠ+Š-ŠŹŠŹTÂTÌ">òÜŐ</button>
                </div>
            </td>
        </tr>`;
    }
    html += "</tbody></table></div>";
    document.getElementById("tab-users").innerHTML = html;
}

async function toggleBan(chatId) {
    await api(`/admin/users/${chatId}/ban`, { method: "PATCH" });
    loadUsers();
}

async function deleteUser(chatId) {
    if (!confirm("ŠăŠ+Š-ŠŹŠŹTÂTÌ ŠŹŠ-ŠŹTÌŠŹŠ-Š-Š-TÂŠŠŠŹTÏ " + chatId + "?")) return;
    await api(`/admin/users/${chatId}`, { method: "DELETE" });
    loadUsers();
}

// Proxies
async function loadProxies() {
    const proxies = await api("/admin/proxies");
    let html = `<div class="form-row">
        <div><label>URL ŠŹTÀŠ-ŠŠTÁŠŹ</label><input class="inp" id="proxyUrl" placeholder="http://user:pass@host:port"></div>
        <div><label>ŠâŠŹŠŹ</label><input class="inp" id="proxyType" placeholder="http/socks5" style="width:100px"></div>
        <div><label>ŠáTÂTÀŠ-Š-Š-</label><input class="inp" id="proxyCountry" placeholder="RU" style="width:80px"></div>
        <button class="btn btn-success" onclick="addProxy()" style="margin-bottom:2px">+ ŠÔŠ-Š-Š-Š-ŠŹTÂTÌ</button>
    </div>`;
    if (proxies.length) {
        html += `<div class="table-wrap"><table><thead><tr><th>ID</th><th>URL</th><th>ŠâŠŹŠŹ</th><th>ŠáTÂTÀŠ-Š-Š-</th><th>ŠáTÂŠ-TÂTĂTÁ</th><th>ŠÔŠŠŠŠTÁTÂŠ-ŠŹTÏ</th></tr></thead><tbody>`;
        for (const p of proxies) {
            const status = p.enabled ? '<span class="badge badge-active">Š-ŠŠŠŹTÎTÇTŃŠ-</span>' : '<span class="badge badge-banned">Š-TÂŠŠŠŹTÎTÇTŃŠ-</span>';
            html += `<tr><td style="font-weight:800;color:var(--darkblue)">${p.id}</td><td style="font-family:monospace;font-size:13px">${p.url}</td><td>${p.proxy_type}</td><td>${p.country || '<span style="color:#999">òÀÔ</span>'}</td><td>${status}</td><td>
                <div style="display:flex;gap:4px">
                    <button class="btn btn-sm btn-secondary" onclick="toggleProxy(${p.id})">${p.enabled ? "ŠÒTËŠŠŠŹ" : "ŠÒŠŠŠŹ"}</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteProxy(${p.id})">òÜŐ</button>
                </div>
            </td></tr>`;
        }
        html += "</tbody></table></div>";
    } else {
        html += '<div class="empty-state">ŠßTÀŠ-ŠŠTÁŠŹ Š-ŠŠ Š+Š-Š-Š-Š-ŠŹŠŠŠ-TË</div>';
    }
    document.getElementById("tab-proxies").innerHTML = html;
}

async function addProxy() {
    const url = document.getElementById("proxyUrl").value.trim();
    if (!url) return alert("ŠăŠŠŠ-ŠŠŠŹTÂŠŠ URL ŠŹTÀŠ-ŠŠTÁŠŹ");
    const proxy_type = document.getElementById("proxyType").value.trim() || "http";
    const country = document.getElementById("proxyCountry").value.trim() || "";
    await api("/admin/proxies", { method: "POST", body: JSON.stringify({ url, proxy_type, country, note: "" }) });
    loadProxies();
}

async function toggleProxy(id) {
    await api(`/admin/proxies/${id}/toggle`, { method: "PATCH" });
    loadProxies();
}

async function deleteProxy(id) {
    if (!confirm("ŠăŠ+Š-ŠŹŠŹTÂTÌ ŠŹTÀŠ-ŠŠTÁŠŹ #" + id + "?")) return;
    await api(`/admin/proxies/${id}`, { method: "DELETE" });
    loadProxies();
}

// Settings
async function loadSettings() {
    document.getElementById("tab-settings").innerHTML = `
        <div style="max-width:500px;margin:0 auto">
            <div class="form-row">
                <div style="flex:1"><label>ŠŰŠ-TÂŠŠTÀŠ-Š-ŠŹ ŠŹŠ-TÀTÁŠŹŠ-ŠŠŠ- (Š-ŠŹŠ-TĂTÂTË)</label>
                    <input class="inp" id="parseInterval" type="number" min="1" max="999" value="30" style="width:100%">
                </div>
                <button class="btn btn-primary" onclick="saveParseInterval()" style="margin-top:18px">ŠáŠ-TĆTÀŠ-Š-ŠŹTÂTÌ</button>
            </div>
            <div class="form-row">
                <div style="flex:1"><label>ŠßTÀŠ-ŠŠTÁŠŹ Š+ŠŹTÏ Š-Š-TÂŠ- (BOT_PROXY)</label>
                    <input class="inp" id="botProxyUrl" style="width:100%" placeholder="socks5://user:pass@host:port">
                </div>
                <button class="btn btn-primary" onclick="saveBotProxy()" style="margin-top:18px">ŠáŠ-TĆTÀŠ-Š-ŠŹTÂTÌ</button>
            </div>
            <div style="margin-top:28px;padding-top:24px;border-top:2px solid #d4e0f0;text-align:center">
                <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
                    <button class="btn btn-success" onclick="triggerParse()">òÖŠ ŠŚŠ-ŠŹTĂTÁTÂŠŹTÂTÌ ŠŹŠ-TÀTÁŠŹŠ-ŠŠ</button>
                    <button class="btn btn-danger" onclick="clearMatches()">ŠȚTÇŠŹTÁTÂŠŹTÂTÌ Š-Š-TÂTÇŠŹ</button>
                </div>
            </div>
            <div id="settingsMsg"></div>
        </div>`;
    try {
        const settings = await api("/admin/settings");
        if (settings.parse_interval_minutes) document.getElementById("parseInterval").value = settings.parse_interval_minutes;
        if (settings.bot_proxy_url) document.getElementById("botProxyUrl").value = settings.bot_proxy_url;
    } catch {}
}

function msg(text, ok = true) {
    document.getElementById("settingsMsg").innerHTML = `<div class="msg ${ok ? 'msg-ok' : 'msg-err'}">${text}</div>`;
}

async function saveParseInterval() {
    const minutes = parseInt(document.getElementById("parseInterval").value);
    if (isNaN(minutes) || minutes < 1 || minutes > 999) return msg("ŠȚTÂ 1 Š+Š- 999", false);
    await api("/admin/settings/parse-interval", { method: "PUT", body: JSON.stringify({ minutes }) });
    msg("ŠŰŠ-TÂŠŠTÀŠ-Š-ŠŹ TÁŠ-TĆTÀŠ-Š-TŃŠ-");
}

async function saveBotProxy() {
    const proxy_url = document.getElementById("botProxyUrl").value.trim();
    await api("/admin/settings/bot-proxy", { method: "PUT", body: JSON.stringify({ proxy_url }) });
    msg("ŠßTÀŠ-ŠŠTÁŠŹ Š+ŠŹTÏ Š-Š-TÂŠ- TÁŠ-TĆTÀŠ-Š-TŃŠ-. ŠÔŠŹTÏ ŠŹTÀŠŹŠ-ŠŠŠ-ŠŠŠ-ŠŹTÏ Š-TĂŠŠŠŠŠ- ŠŹŠŠTÀŠŠŠŹŠ-ŠŹTĂTÁŠŠ Š-Š-TÂŠ-.");
}

async function triggerParse() {
    const res = await api("/admin/trigger-parse", { method: "POST" });
    msg(res.message || "ŠŚŠ-ŠŹTÀŠ-TÁ Š-TÂŠŹTÀŠ-Š-ŠŹŠŠŠ-");
}

async function notifyAll() {
    if (!confirm("ŠȚTÂŠŹTÀŠ-Š-ŠŹTÂTÌ TÂŠŠTÁTÂŠ-Š-Š-ŠŠ TĂŠ-ŠŠŠ+Š-Š-ŠŹŠŠŠ-ŠŹŠŠ Š-TÁŠŠŠ- ŠŹŠ-ŠŹTÌŠŹŠ-Š-Š-TÂŠŠŠŹTÏŠ-?")) return;
    const res = await api("/admin/notify", { method: "POST" });
    msg(`ŠăŠ-ŠŠŠ+Š-Š-ŠŹŠŠŠ-ŠŹŠŠ Š-TÂŠŹTÀŠ-Š-ŠŹŠŠŠ-Š- ${res.sent} ŠŹŠ-ŠŹTÌŠŹŠ-Š-Š-TÂŠŠŠŹTÏŠ-`);
}

async function clearMatches() {
    if (!confirm("ŠăŠ+Š-ŠŹŠŹTÂTÌ Š-TÁŠŠ Š-Š-TÂTÇŠŹ? ŠíTÂŠ- Š+ŠŠŠŠTÁTÂŠ-ŠŹŠŠ Š-ŠŠŠ-Š-TÀŠ-TÂŠŹŠ-Š-.")) return;
    const res = await api("/admin/matches", { method: "DELETE" });
    msg(`ŠăŠ+Š-ŠŹŠŠŠ-Š- ${res.deleted} Š-Š-TÂTÇŠŠŠŠ`);
}

// Sites
async function loadSites() {
    const sites = await api("/admin/sites");
    let html = `<div class="table-wrap"><table><thead><tr><th>ŠáŠ-ŠŠTÂ</th><th>ŠßŠ-TÀTÁŠŠTÀ</th><th>ŠŰŠ-TÂŠŠTÀŠ-Š-ŠŹ</th><th>ŠáTÂŠ-TÂTĂTÁ</th><th>ŠÔŠŠŠŠTÁTÂŠ-ŠŹTÏ</th></tr></thead><tbody>`;
    if (!sites.length) {
        html += `<tr><td colspan="5"><div class="empty-state">ŠáŠ-ŠŠTÂTË Š-ŠŠ Š-Š-TÁTÂTÀŠ-ŠŠŠ-TË</div></td></tr>`;
    }
    for (const s of sites) {
        html += `<tr><td style="font-weight:700">${s.name}</td><td><span class="badge" style="background:#e8f0fe;color:var(--darkblue);font-weight:700">${s.parser}</span></td><td style="color:#666">${s.interval_minutes} Š-ŠŹŠ-</td><td>${s.enabled ? '<span class="badge badge-active">Š-ŠŠŠŹTÎTÇTŃŠ-</span>' : '<span class="badge badge-banned">Š-TÂŠŠŠŹTÎTÇTŃŠ-</span>'}</td><td>
            <button class="btn btn-sm btn-secondary" onclick="toggleSite('${s.name}')">${s.enabled ? "ŠÒTËŠŠŠŹTÎTÇŠŹTÂTÌ" : "ŠÒŠŠŠŹTÎTÇŠŹTÂTÌ"}</button>
        </td></tr>`;
    }
    html += "</tbody></table></div>";
    document.getElementById("tab-sites").innerHTML = html;
}

async function toggleSite(name) {
    await api(`/admin/sites/${encodeURIComponent(name)}/toggle`, { method: "PUT" });
    loadSites();
}

// Logs
async function loadLogs() {
    const data = await api("/admin/logs");
    const logs = data.logs || [];
    let html = logs.length ? `<div style="max-height:500px;overflow-y:auto;font-family:'Courier New',monospace;font-size:12px;background:#f8f9fc;padding:16px;border-radius:20px;border:2px solid #d4e0f0">` : '<div class="empty-state">ŠÛŠ-ŠŠŠ-Š- Š-ŠŠTÂ</div>';
    for (const line of logs.slice().reverse()) {
        let cls = "";
        if (line.includes(" ERROR ")) cls = "level-ERROR";
        else if (line.includes(" WARNING ")) cls = "level-WARNING";
        html += `<div class="log-line"><span class="${cls}">${escapeHtml(line)}</span></div>`;
    }
    if (logs.length) html += "</div>";
    document.getElementById("tab-logs").innerHTML = html;
}

function escapeHtml(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

// Tab switching loaders
document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
        const name = tab.dataset.tab;
        if (name === "dashboard" && !document.querySelector("#tab-dashboard .card")) loadDashboard();
        if (name === "users") loadUsers();
        if (name === "proxies") loadProxies();
        if (name === "settings") loadSettings();
        if (name === "sites") loadSites();
        if (name === "logs") loadLogs();
    });
});

loadDashboard();
</script>
