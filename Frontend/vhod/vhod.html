<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="header__container">
            <nav class="header__nav">
                <img src="images/logo.svg" alt="" class="header__svg">
            </nav>
        </div>
    </header>
    <div class="wrapper">
        <form id="loginForm">
            <h1>Вход</h1>
        <div class="input-box">
            <input type="email" name="email" placeholder="E-mail" required>
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24" >
<path d="M12 12c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5m0-8c1.65 0 3 1.35 3 3s-1.35 3-3 3-3-1.35-3-3 1.35-3 3-3M4 22h16c.55 0 1-.45 1-1v-1c0-3.86-3.14-7-7-7h-4c-3.86 0-7 3.14-7 7v1c0 .55.45 1 1 1m6-7h4c2.76 0 5 2.24 5 5H5c0-2.76 2.24-5 5-5"></path>
</svg>
        </div>
        <div class="input-box">
            <input type="password" name="password" placeholder="Пароль" required>
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"  
fill="currentColor" viewBox="0 0 24 24" >
<path d="M6 22h12c1.1 0 2-.9 2-2v-9c0-1.1-.9-2-2-2h-1V7c0-2.76-2.24-5-5-5S7 4.24 7 7v2H6c-1.1 0-2 .9-2 2v9c0 1.1.9 2 2 2M9 7c0-1.65 1.35-3 3-3s3 1.35 3 3v2H9zm-3 4h12v9H6z"></path>
</svg>
        </div>
        <div class="remember">
            <label for=""> <input type="checkbox">Запомни меня</label>
            <a href="/forgot_password.html">Забыл пароль?</a>
        </div>
        <button href="../main.html" type="submit" class="btn">Войти</button>
        <div class="register-link">
            <p>Нет аккаунта? <a href="../register/register.html">Зарегистрироваться</a></p>
        </div>
        </form>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: data.email,
                        password: data.password
                    })
                });

                if (response.ok) {
                    const result = await response.json();
                    localStorage.setItem('user', JSON.stringify(result.user));
                    localStorage.setItem('chat_id', result.user.chat_id);
                    localStorage.setItem('token', result.access_token);

                    window.location.href = '../main.html';
                } else {
                    let msg = 'Неверный логин или пароль';
                    try { const err = await response.json(); msg = err.detail || msg; } catch {}
                    alert(msg);
                }

            } catch (err) {
                alert('Ошибка сети');
            }
        });
    </script>
</body>
</html>
