<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Смена пароля</title>

    <link rel="stylesheet" href="style_pass.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap"
          rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="header__container">
            <nav class="header__nav">
                <img src="images/logo.svg" alt="" class="header__svg">
            </nav>
        </div>
    </header>

<div class="wrapper">

    <form id="newPasswordForm">

        <h1>Новый пароль</h1>

        <div class="input-box">
            <input
                type="email"
                name="email"
                placeholder="E-mail"
                required
            >
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24" >
<path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2m0 2v.51l-8 6.22-8-6.22V6zM4 18V9.04l7.39 5.74c.18.14.4.21.61.21s.43-.07.61-.21L20 9.03v8.96H4Z"></path>
</svg>
        </div>

        <div class="input-box">
            <input
                type="number"
                name="code"
                placeholder="Код подтверждения"
                required
            >
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24" >
<path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2M9 6c0-1.65 1.35-3 3-3s3 1.35 3 3v2H9zm9 14H6V10h12zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2"></path>
</svg>
        </div>

        <div class="input-box">
            <input
                type="password"
                name="password"
                placeholder="Новый пароль (мин. 8 символов, хотя бы 1 буква)"
                required
            >
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"  
fill="currentColor" viewBox="0 0 24 24" >
<path d="M6 22h12c1.1 0 2-.9 2-2v-9c0-1.1-.9-2-2-2h-1V7c0-2.76-2.24-5-5-5S7 4.24 7 7v2H6c-1.1 0-2 .9-2 2v9c0 1.1.9 2 2 2M9 7c0-1.65 1.35-3 3-3s3 1.35 3 3v2H9zm-3 4h12v9H6z"></path>
</svg>
        </div>

        <div class="input-box">
            <input
                type="password"
                name="password_repeat"
                placeholder="Повторите пароль"
                required
            >
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"  
fill="currentColor" viewBox="0 0 24 24" >
<path d="M6 22h12c1.1 0 2-.9 2-2v-9c0-1.1-.9-2-2-2h-1V7c0-2.76-2.24-5-5-5S7 4.24 7 7v2H6c-1.1 0-2 .9-2 2v9c0 1.1.9 2 2 2M9 7c0-1.65 1.35-3 3-3s3 1.35 3 3v2H9zm-3 4h12v9H6z"></path>
</svg>
        </div>

        <button type="submit" class="btn">
            Сменить пароль
        </button>
        <div id="message"></div>

        <div class="register-link">
            <p><a href="vhod/vhod.html">
                Вернуться ко входу
            </a></p>
        </div>
    </form>

</div>

<script>

const savedEmail =
    localStorage.getItem('reset_email');

const emailInput = document.querySelector('input[name="email"]');
if(savedEmail){
    emailInput.value = savedEmail;
    emailInput.readOnly = true;
}

document.getElementById('newPasswordForm')
.addEventListener('submit', async function(e){

    e.preventDefault();

    const msgDiv = document.getElementById('message');
    const btn = this.querySelector('.btn');
    const originalText = btn.textContent;

    const email = this.email.value;
    const code = parseInt(this.code.value);
    const password = this.password.value;
    const repeat = this.password_repeat.value;

    if(password !== repeat){
        msgDiv.innerHTML = 'Пароли не совпадают';
        return;
    }
    if(password.length < 8){
        msgDiv.innerHTML = 'Пароль должен быть минимум 8 символов';
        return;
    }
    if(!/[a-z]/.test(password)){
        msgDiv.innerHTML = 'Пароль должен содержать хотя бы одну строчную букву';
        return;
    }
    if(!/\d/.test(password)){
        msgDiv.innerHTML = 'Пароль должен содержать хотя бы одну цифру';
        return;
    }


    btn.disabled = true;
    btn.textContent = 'Смена...';
    msgDiv.innerHTML = '';

    try{
        const response = await fetch('/new_password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, code, new_password: password })
        });
        const result = await response.json();
        if(response.ok){
            msgDiv.innerHTML = 'Пароль успешно изменён! Перенаправление...';
            localStorage.removeItem(
                'reset_email'
            );
            setTimeout(() => {
                window.location.href = 'vhod/vhod.html';
            }, 2000);
        }else{
            msgDiv.innerHTML = result.detail || 'Ошибка';
            btn.disabled = false;
            btn.textContent = originalText;
        }

    }catch(err){
        msgDiv.innerHTML = 'Ошибка сети. Проверьте подключение.';
        btn.disabled = false;
        btn.textContent = originalText;
    }

});
</script>

</body>
</html>
