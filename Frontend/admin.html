<body>
<div class="container">
    <h1>СӮРӘР© в•ЁРҜв•Ёв–‘в•Ёв•ңв•Ёв•Ўв•Ёв•—в•ӨРң в•ӨР“в•Ёв”җв•ӨРҗв•Ёв–‘в•Ёв–“в•Ёв•—в•Ёв•Ўв•Ёв•ңв•Ёв••в•ӨРҹ</h1>
    <div class="tabs" id="tabs">
        <button class="tab active" data-tab="dashboard">в•ЁРӨв•Ёв–‘в•ӨРҳв•Ёв–’в•Ёв•ӣв•ӨРҗв•Ёв”Ө</button>
        <button class="tab" data-tab="users">в•ЁРҜв•Ёв•ӣв•Ёв•—в•ӨРңв•Ёв•–в•Ёв•ӣв•Ёв–“в•Ёв–‘в•ӨР’в•Ёв•Ўв•Ёв•—в•Ёв••</button>
        <button class="tab" data-tab="proxies">в•ЁРҜв•ӨРҗв•Ёв•ӣв•Ёв•‘в•ӨР‘в•Ёв••</button>
        <button class="tab" data-tab="settings">в•ЁРӯв•Ёв–‘в•ӨР‘в•ӨР’в•ӨРҗв•Ёв•ӣв•Ёв•Јв•Ёв•‘в•Ёв••</button>
        <button class="tab" data-tab="sites">в•ЁРұв•Ёв–‘в•Ёв•Јв•ӨР’в•ӨРӣ</button>
        <button class="tab" data-tab="logs">в•ЁР«в•Ёв•ӣв•Ёв”Ӯв•Ёв••</button>
    </div>

    <div id="tab-dashboard" class="tab-content active"></div>
    <div id="tab-users" class="tab-content"></div>
    <div id="tab-proxies" class="tab-content"></div>
    <div id="tab-settings" class="tab-content"></div>
    <div id="tab-sites" class="tab-content"></div>
    <div id="tab-logs" class="tab-content"></div>
</div>

<script>
const token = localStorage.getItem("token");
if (!token) { window.location.href = "/vhod/vhod.html"; }
const headers = { "Content-Type": "application/json", "Authorization": `Bearer ${token}` };

async function api(url, opts = {}) {
    const res = await fetch(url, { headers: { ...headers, ...opts.headers }, ...opts });
    if (res.status === 401) { localStorage.removeItem("token"); window.location.href = "/vhod/vhod.html"; }
    if (!res.ok) { const err = await res.json().catch(() => ({ detail: res.statusText })); throw new Error(err.detail || "в•ЁР®в•ӨРҳв•Ёв••в•Ёв–’в•Ёв•‘в•Ёв–‘"); }
    return res.json();
}

// Admin check
(async () => {
    try {
        await api("/admin/check");
    } catch { window.location.href = "/vhod/vhod.html"; }
})();

// Tabs
document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        document.getElementById("tab-" + tab.dataset.tab).classList.add("active");
    });
});

// Dashboard
async function loadDashboard() {
    const data = await api("/admin/stats");
    const el = document.getElementById("tab-dashboard");
    el.innerHTML = `<div class="card-grid">
        <div class="card"><span class="num">${data.total_users}</span><span class="label">в•ЁРўв•ӨР‘в•Ёв•Ўв•Ёв”Ӯв•Ёв•ӣ в•Ёв”җв•Ёв•ӣв•Ёв•—в•ӨРңв•Ёв•–в•Ёв•ӣв•Ёв–“в•Ёв–‘в•ӨР’в•Ёв•Ўв•Ёв•—в•Ёв•Ўв•Ёв•Ј</span></div>
        <div class="card"><span class="num">${data.active_users}</span><span class="label">в•ЁР в•Ёв•‘в•ӨР’в•Ёв••в•Ёв–“в•Ёв•ңв•ӨРӣв•ӨР•</span></div>
        <div class="card"><span class="num">${data.banned_users}</span><span class="label">в•ЁР§в•Ёв–‘в•Ёв–’в•Ёв•—в•Ёв•ӣв•Ёв•‘в•Ёв••в•ӨРҗв•Ёв•ӣв•Ёв–“в•Ёв–‘в•Ёв•ңв•Ёв•ӣ</span></div>
        <div class="card"><span class="num">${data.team_subs}</span><span class="label">в•ЁРҜв•Ёв•ӣв•Ёв”Өв•Ёв”җв•Ёв••в•ӨР‘в•Ёв•‘в•Ёв•• в•Ёв•ңв•Ёв–‘ в•Ёв•‘в•Ёв•ӣв•Ёв•қв•Ёв–‘в•Ёв•ңв•Ёв”Өв•ӨРӣ</span></div>
        <div class="card"><span class="num">${data.venue_subs}</span><span class="label">в•ЁРҜв•Ёв•ӣв•Ёв”Өв•Ёв”җв•Ёв••в•ӨР‘в•Ёв•‘в•Ёв•• в•Ёв•ңв•Ёв–‘ в•ӨР‘в•ӨР’в•Ёв–‘в•Ёв”Өв•Ёв••в•Ёв•ӣв•Ёв•ңв•ӨРӣ</span></div>
        <div class="card"><span class="num">${data.matches}</span><span class="label">в•ЁР¬в•Ёв–‘в•ӨР’в•ӨР—в•Ёв•Ўв•Ёв•Ј в•Ёв–“ в•Ёв–’в•Ёв–‘в•Ёв•–в•Ёв•Ў</span></div>
        <div class="card"><span class="num">${data.proxies}</span><span class="label">в•ЁРҜв•ӨРҗв•Ёв•ӣв•Ёв•‘в•ӨР‘в•Ёв••</span></div>
    </div>`;
}

// Users
async function loadUsers() {
    const users = await api("/admin/users");
    let html = `<table><thead><tr><th>ID</th><th>в•ЁРЁв•Ёв•қв•ӨРҹ</th><th>Email</th><th>Telegram</th><th>в•ЁРұв•ӨР’в•Ёв–‘в•ӨР’в•ӨР“в•ӨР‘</th><th>в•ЁРҜв•Ёв•ӣв•Ёв”Өв•Ёв”җв•Ёв••в•ӨР‘в•Ёв•‘в•Ёв••</th><th>в•ЁРӨв•Ёв•Ўв•Ёв•Јв•ӨР‘в•ӨР’в•Ёв–“в•Ёв••в•ӨРҹ</th></tr></thead><tbody>`;
    for (const u of users) {
        const status = u.is_active ? '<span class="badge badge-active">в•Ёв–‘в•Ёв•‘в•ӨР’в•Ёв••в•Ёв–“в•Ёв•Ўв•Ёв•ң</span>' : '<span class="badge badge-banned">в•Ёв•–в•Ёв–‘в•Ёв–’в•Ёв•—в•Ёв•ӣв•Ёв•‘в•Ёв••в•ӨРҗв•Ёв•ӣв•Ёв–“в•Ёв–‘в•Ёв•ң</span>';
        const subs = u.subscriptions.map(s => `${s.value} (${s.type})`).join(", ") || "СӮРҗРӨ";
        html += `<tr><td>${u.chat_id}</td><td>${u.username || "СӮРҗРӨ"}</td><td>${u.email || "СӮРҗРӨ"}</td><td>${u.telegram || "СӮРҗРӨ"}</td><td>${status}</td><td class="subs-list">${subs}</td><td>
            <button class="btn btn-sm btn-secondary" onclick="toggleBan(${u.chat_id})">${u.is_active ? "в•ЁР§в•Ёв–‘в•Ёв–’в•Ёв•—в•Ёв•ӣв•Ёв•‘в•Ёв••в•ӨРҗв•Ёв•ӣв•Ёв–“в•Ёв–‘в•ӨР’в•ӨРң" : "в•ЁР°в•Ёв–‘в•Ёв•–в•Ёв–’в•Ёв•—в•Ёв•ӣв•Ёв•‘в•Ёв••в•ӨРҗв•Ёв•ӣв•Ёв–“в•Ёв–‘в•ӨР’в•ӨРң"}</button>
            <button class="btn btn-sm btn-primary" onclick="showAddSub(${u.chat_id})">+ в•Ёв”җв•Ёв•ӣв•Ёв”Өв•Ёв”җв•Ёв••в•ӨР‘в•Ёв•‘в•Ёв–‘</button>
            <button class="btn btn-sm btn-danger" onclick="deleteUser(${u.chat_id})">в•ЁРів•Ёв”Өв•Ёв–‘в•Ёв•—в•Ёв••в•ӨР’в•ӨРң</button>
        </td></tr>`;
    }
    html += "</tbody></table>";
    document.getElementById("tab-users").innerHTML = html;
}

async function toggleBan(chatId) {
    await api(`/admin/users/${chatId}/ban`, { method: "PATCH" });
    loadUsers();
}

async function deleteUser(chatId) {
    if (!confirm("в•ЁРів•Ёв”Өв•Ёв–‘в•Ёв•—в•Ёв••в•ӨР’в•ӨРң в•Ёв”җв•Ёв•ӣв•Ёв•—в•ӨРңв•Ёв•–в•Ёв•ӣв•Ёв–“в•Ёв–‘в•ӨР’в•Ёв•Ўв•Ёв•—в•ӨРҹ " + chatId + "?")) return;
    await api(`/admin/users/${chatId}`, { method: "DELETE" });
    loadUsers();
}

function showAddSub(chatId) {
    const type = prompt("в•ЁРІв•Ёв••в•Ёв”җ в•Ёв”җв•Ёв•ӣв•Ёв”Өв•Ёв”җв•Ёв••в•ӨР‘в•Ёв•‘в•Ёв•• (team / venue):");
    if (!type || !["team", "venue"].includes(type)) return;
    const value = prompt("в•ЁРӯв•Ёв–‘в•Ёв•–в•Ёв–“в•Ёв–‘в•Ёв•ңв•Ёв••в•Ёв•Ў в•Ёв•‘в•Ёв•ӣв•Ёв•қв•Ёв–‘в•Ёв•ңв•Ёв”Өв•ӨРӣ в•Ёв••в•Ёв•—в•Ёв•• в•ӨР‘в•ӨР’в•Ёв–‘в•Ёв”Өв•Ёв••в•Ёв•ӣв•Ёв•ңв•Ёв–‘:");
    if (!value) return;
    api(`/admin/users/${chatId}/subscriptions`, { method: "POST", body: JSON.stringify({ type, value }) })
        .then(() => loadUsers()).catch(e => alert(e.message));
}

// Proxies
async function loadProxies() {
    const proxies = await api("/admin/proxies");
    let html = `<div class="form-row"><input class="inp" id="proxyUrl" placeholder="http://user:pass@host:port"><input class="inp" id="proxyType" placeholder="в•ӨР’в•Ёв••в•Ёв”җ (http/socks5)" style="width:100px"><input class="inp" id="proxyCountry" placeholder="в•ӨР‘в•ӨР’в•ӨРҗв•Ёв–‘в•Ёв•ңв•Ёв–‘" style="width:100px"><button class="btn btn-success" onclick="addProxy()">+ в•ЁРӨв•Ёв•ӣв•Ёв–’в•Ёв–‘в•Ёв–“в•Ёв••в•ӨР’в•ӨРң</button></div>`;
    if (proxies.length) {
        html += `<table><thead><tr><th>ID</th><th>URL</th><th>в•ЁРІв•Ёв••в•Ёв”җ</th><th>в•ЁРұв•ӨР’в•ӨРҗв•Ёв–‘в•Ёв•ңв•Ёв–‘</th><th>в•ЁРҜв•ӨРҗв•Ёв••в•Ёв•қв•Ёв•Ўв•ӨР—в•Ёв–‘в•Ёв•ңв•Ёв••в•Ёв•Ў</th><th>в•ЁРұв•ӨР’в•Ёв–‘в•ӨР’в•ӨР“в•ӨР‘</th><th>в•ЁРӨв•Ёв•Ўв•Ёв•Јв•ӨР‘в•ӨР’в•Ёв–“в•Ёв••в•ӨРҹ</th></tr></thead><tbody>`;
        for (const p of proxies) {
            const status = p.enabled ? '<span class="badge badge-enabled">в•Ёв–“в•Ёв•‘в•Ёв•—</span>' : '<span class="badge badge-disabled">в•Ёв–“в•ӨРӣв•Ёв•‘в•Ёв•—</span>';
            html += `<tr><td>${p.id}</td><td>${p.url}</td><td>${p.proxy_type}</td><td>${p.country}</td><td>${p.note || ""}</td><td>${status}</td><td>
                <button class="btn btn-sm btn-secondary" onclick="toggleProxy(${p.id})">${p.enabled ? "в•ЁРўв•ӨРӣв•Ёв•‘в•Ёв•—" : "в•ЁРўв•Ёв•‘в•Ёв•—"}</button>
                <button class="btn btn-sm btn-danger" onclick="deleteProxy(${p.id})">в•ЁРів•Ёв”Өв•Ёв–‘в•Ёв•—в•Ёв••в•ӨР’в•ӨРң</button>
            </td></tr>`;
        }
        html += "</tbody></table>";
    } else html += "<p style='color:#888'>в•ЁРҜв•ӨРҗв•Ёв•ӣв•Ёв•‘в•ӨР‘в•Ёв•• в•Ёв•ңв•Ёв•Ў в•Ёв”Өв•Ёв•ӣв•Ёв–’в•Ёв–‘в•Ёв–“в•Ёв•—в•Ёв•Ўв•Ёв•ңв•ӨРӣ</p>";
    document.getElementById("tab-proxies").innerHTML = html;
}

async function addProxy() {
    const url = document.getElementById("proxyUrl").value.trim();
    if (!url) return alert("в•ЁРів•Ёв•‘в•Ёв–‘в•Ёв•ўв•Ёв••в•ӨР’в•Ёв•Ў URL в•Ёв”җв•ӨРҗв•Ёв•ӣв•Ёв•‘в•ӨР‘в•Ёв••");
    const proxy_type = document.getElementById("proxyType").value.trim() || "http";
    const country = document.getElementById("proxyCountry").value.trim() || "";
    await api("/admin/proxies", { method: "POST", body: JSON.stringify({ url, proxy_type, country, note: "" }) });
    loadProxies();
}

async function toggleProxy(id) {
    await api(`/admin/proxies/${id}/toggle`, { method: "PATCH" });
    loadProxies();
}

async function deleteProxy(id) {
    if (!confirm("в•ЁРів•Ёв”Өв•Ёв–‘в•Ёв•—в•Ёв••в•ӨР’в•ӨРң в•Ёв”җв•ӨРҗв•Ёв•ӣв•Ёв•‘в•ӨР‘в•Ёв•• #" + id + "?")) return;
    await api(`/admin/proxies/${id}`, { method: "DELETE" });
    loadProxies();
}

// Settings
async function loadSettings() {
    document.getElementById("tab-settings").innerHTML = `
        <div style="max-width:400px">
            <div class="form-row"><label>в•ЁРЁв•Ёв•ңв•ӨР’в•Ёв•Ўв•ӨРҗв•Ёв–“в•Ёв–‘в•Ёв•— в•Ёв”җв•Ёв–‘в•ӨРҗв•ӨР‘в•Ёв••в•Ёв•ңв•Ёв”Ӯв•Ёв–‘ (в•Ёв•қв•Ёв••в•Ёв•ңв•ӨР“в•ӨР’в•ӨРӣ):</label>
                <input class="inp" id="parseInterval" type="number" min="1" max="1440" value="30">
                <button class="btn btn-primary" onclick="saveParseInterval()">в•ЁРұв•Ёв•ӣв•ӨР•в•ӨРҗв•Ёв–‘в•Ёв•ңв•Ёв••в•ӨР’в•ӨРң</button>
            </div>
            <div class="form-row"><label>в•ЁРҜв•ӨРҗв•Ёв•ӣв•Ёв•‘в•ӨР‘в•Ёв•• в•Ёв”Өв•Ёв•—в•ӨРҹ в•Ёв–’в•Ёв•ӣв•ӨР’в•Ёв–‘ (BOT_PROXY):</label>
                <input class="inp" id="botProxyUrl" style="width:100%" placeholder="http://proxy:8080">
                <button class="btn btn-primary" onclick="saveBotProxy()">в•ЁРұв•Ёв•ӣв•ӨР•в•ӨРҗв•Ёв–‘в•Ёв•ңв•Ёв••в•ӨР’в•ӨРң</button>
            </div>
            <div class="form-row"><button class="btn btn-success" onclick="triggerParse()">в•ЁР§в•Ёв–‘в•Ёв”җв•ӨР“в•ӨР‘в•ӨР’в•Ёв••в•ӨР’в•ӨРң в•Ёв”җв•Ёв–‘в•ӨРҗв•ӨР‘в•Ёв••в•Ёв•ңв•Ёв”Ӯ</button></div>
            <div class="form-row"><button class="btn btn-success" onclick="notifyAll()">в•ЁР®в•ӨР’в•Ёв”җв•ӨРҗв•Ёв–‘в•Ёв–“в•Ёв••в•ӨР’в•ӨРң в•ӨР“в•Ёв–“в•Ёв•Ўв•Ёв”Өв•Ёв•ӣв•Ёв•қв•Ёв•—в•Ёв•Ўв•Ёв•ңв•Ёв••в•Ёв•Ў в•Ёв–“в•ӨР‘в•Ёв•Ўв•Ёв•қ</button></div>
            <div class="form-row"><button class="btn btn-danger" onclick="clearMatches()">в•ЁР®в•ӨР—в•Ёв••в•ӨР‘в•ӨР’в•Ёв••в•ӨР’в•ӨРң в•Ёв•қв•Ёв–‘в•ӨР’в•ӨР—в•Ёв••</button></div>
            <div id="settingsMsg"></div>
        </div>`;
    try {
        const settings = await api("/admin/settings");
        if (settings.parse_interval_minutes) document.getElementById("parseInterval").value = settings.parse_interval_minutes;
        if (settings.bot_proxy_url) document.getElementById("botProxyUrl").value = settings.bot_proxy_url;
    } catch {}
}

function msg(text, ok = true) {
    document.getElementById("settingsMsg").innerHTML = `<div class="msg ${ok ? 'msg-ok' : 'msg-err'}">${text}</div>`;
}

async function saveParseInterval() {
    const minutes = parseInt(document.getElementById("parseInterval").value);
    if (isNaN(minutes) || minutes < 1 || minutes > 1440) return msg("в•ЁР®в•ӨР’ 1 в•Ёв”Өв•Ёв•ӣ 1440", false);
    await api("/admin/settings/parse-interval", { method: "PUT", body: JSON.stringify({ minutes }) });
    msg("в•ЁРЁв•Ёв•ңв•ӨР’в•Ёв•Ўв•ӨРҗв•Ёв–“в•Ёв–‘в•Ёв•— в•ӨР‘в•Ёв•ӣв•ӨР•в•ӨРҗв•Ёв–‘в•Ёв•ңв•ӨРЎв•Ёв•ң");
}

async function saveBotProxy() {
    const proxy_url = document.getElementById("botProxyUrl").value.trim();
    await api("/admin/settings/bot-proxy", { method: "PUT", body: JSON.stringify({ proxy_url }) });
    msg("в•ЁРҜв•ӨРҗв•Ёв•ӣв•Ёв•‘в•ӨР‘в•Ёв•• в•Ёв”Өв•Ёв•—в•ӨРҹ в•Ёв–’в•Ёв•ӣв•ӨР’в•Ёв–‘ в•ӨР‘в•Ёв•ӣв•ӨР•в•ӨРҗв•Ёв–‘в•Ёв•ңв•ӨРЎв•Ёв•ң. в•ЁРӨв•Ёв•—в•ӨРҹ в•Ёв”җв•ӨРҗв•Ёв••в•Ёв•қв•Ёв•Ўв•Ёв•ңв•Ёв•Ўв•Ёв•ңв•Ёв••в•ӨРҹ в•Ёв•ңв•ӨР“в•Ёв•ўв•Ёв•Ўв•Ёв•ң в•Ёв”җв•Ёв•Ўв•ӨРҗв•Ёв•Ўв•Ёв•–в•Ёв–‘в•Ёв”җв•ӨР“в•ӨР‘в•Ёв•‘ в•Ёв–’в•Ёв•ӣв•ӨР’в•Ёв–‘.");
}

async function triggerParse() {
    const res = await api("/admin/trigger-parse", { method: "POST" });
    msg(res.message || "в•ЁР§в•Ёв–‘в•Ёв”җв•ӨРҗв•Ёв•ӣв•ӨР‘ в•Ёв•ӣв•ӨР’в•Ёв”җв•ӨРҗв•Ёв–‘в•Ёв–“в•Ёв•—в•Ёв•Ўв•Ёв•ң");
}

async function notifyAll() {
    if (!confirm("в•ЁР®в•ӨР’в•Ёв”җв•ӨРҗв•Ёв–‘в•Ёв–“в•Ёв••в•ӨР’в•ӨРң в•ӨР’в•Ёв•Ўв•ӨР‘в•ӨР’в•Ёв•ӣв•Ёв–“в•Ёв•ӣв•Ёв•Ў в•ӨР“в•Ёв–“в•Ёв•Ўв•Ёв”Өв•Ёв•ӣв•Ёв•қв•Ёв•—в•Ёв•Ўв•Ёв•ңв•Ёв••в•Ёв•Ў в•Ёв–“в•ӨР‘в•Ёв•Ўв•Ёв•қ в•Ёв”җв•Ёв•ӣв•Ёв•—в•ӨРңв•Ёв•–в•Ёв•ӣв•Ёв–“в•Ёв–‘в•ӨР’в•Ёв•Ўв•Ёв•—в•ӨРҹв•Ёв•қ?")) return;
    const res = await api("/admin/notify", { method: "POST" });
    msg(`в•ЁРів•Ёв–“в•Ёв•Ўв•Ёв”Өв•Ёв•ӣв•Ёв•қв•Ёв•—в•Ёв•Ўв•Ёв•ңв•Ёв••в•Ёв•Ў в•Ёв•ӣв•ӨР’в•Ёв”җв•ӨРҗв•Ёв–‘в•Ёв–“в•Ёв•—в•Ёв•Ўв•Ёв•ңв•Ёв•ӣ ${res.sent} в•Ёв”җв•Ёв•ӣв•Ёв•—в•ӨРңв•Ёв•–в•Ёв•ӣв•Ёв–“в•Ёв–‘в•ӨР’в•Ёв•Ўв•Ёв•—в•ӨРҹв•Ёв•қ`);
}

async function clearMatches() {
    if (!confirm("в•ЁРів•Ёв”Өв•Ёв–‘в•Ёв•—в•Ёв••в•ӨР’в•ӨРң в•Ёв–“в•ӨР‘в•Ёв•Ў в•Ёв•қв•Ёв–‘в•ӨР’в•ӨР—в•Ёв••? в•ЁРҪв•ӨР’в•Ёв•ӣ в•Ёв”Өв•Ёв•Ўв•Ёв•Јв•ӨР‘в•ӨР’в•Ёв–“в•Ёв••в•Ёв•Ў в•Ёв•ңв•Ёв•Ўв•Ёв•ӣв•Ёв–’в•ӨРҗв•Ёв–‘в•ӨР’в•Ёв••в•Ёв•қв•Ёв•ӣ.")) return;
    const res = await api("/admin/matches", { method: "DELETE" });
    msg(`в•ЁРів•Ёв”Өв•Ёв–‘в•Ёв•—в•Ёв•Ўв•Ёв•ңв•Ёв•ӣ ${res.deleted} в•Ёв•қв•Ёв–‘в•ӨР’в•ӨР—в•Ёв•Ўв•Ёв•Ј`);
}

// Sites
async function loadSites() {
    const sites = await api("/admin/sites");
    let html = `<table><thead><tr><th>в•ЁРұв•Ёв–‘в•Ёв•Јв•ӨР’</th><th>в•ЁРҜв•Ёв–‘в•ӨРҗв•ӨР‘в•Ёв•Ўв•ӨРҗ</th><th>в•ЁРЁв•Ёв•ңв•ӨР’в•Ёв•Ўв•ӨРҗв•Ёв–“в•Ёв–‘в•Ёв•—</th><th>в•ЁРұв•ӨР’в•Ёв–‘в•ӨР’в•ӨР“в•ӨР‘</th><th>в•ЁРӨв•Ёв•Ўв•Ёв•Јв•ӨР‘в•ӨР’в•Ёв–“в•Ёв••в•ӨРҹ</th></tr></thead><tbody>`;
    for (const s of sites) {
        html += `<tr><td>${s.name}</td><td>${s.parser}</td><td>${s.interval_minutes} в•Ёв•қв•Ёв••в•Ёв•ң</td><td>${s.enabled ? '<span class="badge badge-enabled">в•Ёв–“в•Ёв•‘в•Ёв•—</span>' : '<span class="badge badge-disabled">в•Ёв–“в•ӨРӣв•Ёв•‘в•Ёв•—</span>'}</td><td>
            <button class="btn btn-sm btn-secondary" onclick="toggleSite('${s.name}')">${s.enabled ? "в•ЁРўв•ӨРӣв•Ёв•‘в•Ёв•—в•ӨРһв•ӨР—в•Ёв••в•ӨР’в•ӨРң" : "в•ЁРўв•Ёв•‘в•Ёв•—в•ӨРһв•ӨР—в•Ёв••в•ӨР’в•ӨРң"}</button>
        </td></tr>`;
    }
    html += "</tbody></table>";
    document.getElementById("tab-sites").innerHTML = html;
}

async function toggleSite(name) {
    await api(`/admin/sites/${encodeURIComponent(name)}/toggle`, { method: "PUT" });
    loadSites();
}

// Logs
async function loadLogs() {
    const data = await api("/admin/logs");
    const logs = data.logs || [];
    let html = `<div style="max-height:500px;overflow-y:auto;font-family:monospace;font-size:12px;background:#0f0f1a;padding:12px;border-radius:8px">`;
    for (const line of logs.slice().reverse()) {
        let cls = "";
        if (line.includes(" ERROR ")) cls = "level-ERROR";
        else if (line.includes(" WARNING ")) cls = "level-WARNING";
        html += `<div class="log-line"><span class="${cls}">${escapeHtml(line)}</span></div>`;
    }
    html += "</div>";
    document.getElementById("tab-logs").innerHTML = html;
}

function escapeHtml(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

// Tab switching loaders
document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
        const name = tab.dataset.tab;
        if (name === "dashboard" && !document.querySelector("#tab-dashboard .card")) loadDashboard();
        if (name === "users") loadUsers();
        if (name === "proxies") loadProxies();
        if (name === "settings") loadSettings();
        if (name === "sites") loadSites();
        if (name === "logs") loadLogs();
    });
});

loadDashboard();
</script>
