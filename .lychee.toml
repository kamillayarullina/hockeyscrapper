# Lychee link checker configuration

# Cache
cache = true
max_cache_age = "1d"

# Exclude patterns (authenticated, rate-limited, or unsuitable links)
exclude = [
    # GitHub issue/PR links may require authentication
    'https://github.com/.*/issues/',
    'https://github.com/.*/pull/',
    # Figma links require authentication
    'https://www.figma.com/',
    # Common false positives
    'http://localhost',
    'http://127.0.0.1',
    'https://my-mvp-v0.example.com',
]

# Only check these schemes
scheme = ["http", "https"]

# Timeout per link (seconds)
timeout = 30

# Retry
retry_wait_time = 5
max_retries = 3

# Acceptable response codes
accept = [200, 201, 202, 203, 204, 206, 301, 302, 303, 307, 308]

# Exclude mailto links
exclude_mail = true
