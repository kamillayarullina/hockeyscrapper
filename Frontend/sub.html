<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подписки</title>
    <link rel="stylesheet" href="style_main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap"
          rel="stylesheet">
</head>
<body>
<div class="profile-container">

    <h1>Управление подписками</h1>

    <div class="subscriptions-grid" id="teamsList"></div>
    <script>
            const khlTeams = [
                "СКА", "ЦСКА", "Ак Барс", "Динамо Москва", "Локомотив",
                "Спартак", "Трактор", "Авангард", "Металлург Мг", "Салават Юлаев",
                "Северсталь", "Торпедо", "Нефтехимик", "Сибирь", "Витязь",
                "Амур", "Адмирал", "Барыс", "Куньлунь Ред Стар", "Лада",
                "Сочи", "Динамо Минск", "Автомобилист"
            ];

            const API = "";
            const token = localStorage.getItem("token");

            let chatId = localStorage.getItem("chat_id");
            let subscriptions = [];

            async function resolveChatId() {
                if (token) {
                    try {
                        const r = await fetch(`${API}/me`, {
                            headers: { "Authorization": `Bearer ${token}` }
                        });
                        if (r.ok) {
                            const user = await r.json();
                            chatId = user.chat_id;
                            localStorage.setItem("chat_id", chatId);
                            return;
                        }
                    } catch {}
                }
                if (!chatId) chatId = localStorage.getItem("chat_id");
            }

            async function loadSubscriptions() {
                await resolveChatId();
                if (!chatId) { render(); return; }
                try {
                    const r = await fetch(`${API}/subscriptions/${chatId}`);
                    const data = await r.json();
                    subscriptions = data.subscriptions || [];
                    localStorage.setItem("subscriptions", JSON.stringify(subscriptions));
                    render();
                } catch { }
            }

            const container = document.getElementById("teamsList");

            function render() {
                container.innerHTML = "";
                khlTeams.forEach(team => {
                    const subscribed = subscriptions.includes(team.toLowerCase());
                    container.innerHTML += `
                        <div class="subscription-card">
                            <span>${team}</span>
                            <button class="btn-small ${subscribed ? 'unsubscribe' : ''}"
                                onclick="toggleSubscription('${team}')">
                                ${subscribed ? 'Отписаться' : 'Подписаться'}
                            </button>
                        </div>
                    `;
                });
            }

            async function toggleSubscription(team) {
                await resolveChatId();
                if (!chatId) { alert("Авторизуйтесь"); return; }
                try {
                    const r = await fetch(`${API}/subscription/toggle`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ chat_id: parseInt(chatId), team_name: team })
                    });
                    const result = await r.json();
                    if (r.ok) {
                        await loadSubscriptions();
                    } else {
                        alert(result.message || "Ошибка");
                    }
                } catch (err) {
                    alert("Ошибка сети: " + err.message);
                }
            }

            loadSubscriptions();
        </script>
    <button class="btn"
            onclick="window.location.href='main.html'">
        Назад
    </button>

</div>
</body>
</html>
