<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подписки</title>
    <link rel="stylesheet" href="style_main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap"
          rel="stylesheet">
    <style>
        #subError {
            color: #c62828;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            margin: 8px 0 16px;
            display: none;
        }
        #subError.visible { display: block; }
    </style>
</head>
<body>
<div class="profile-container">

    <h1>Управление подписками</h1>

    <div id="subError"></div>
    <div class="subscriptions-grid" id="teamsList"></div>
    <script>
        const khlTeams = [
            { name: "СКА",  logo: "images/SKA.png" },
            { name: "ЦСКА", logo: "images/CSKA.png" },
            { name: "Ак Барс", logo: "images/AkBars.png" },
            { name: "Динамо Москва", logo: "images/DinMsk.png" },
            { name: "Локомотив", logo: "images/Lokomotiv.png" },
            { name: "Спартак", logo: "images/Spartak.png" },
            { name: "Трактор", logo: "images/Traktor.png" },
            { name: "Авангард", logo: "images/Avangard.png" },
            { name: "Металлург Мг", logo: "images/Metallurg.png" },
            { name: "Салават Юлаев", logo: "images/Salavat.png" },
            { name: "Северсталь", logo: "images/Severstal.png" },
            { name: "Торпедо", logo: "images/Torpedo.png" },
            { name: "Нефтехимик", logo: "images/Neftekhimik.png" },
            { name: "Сибирь", logo: "images/Sibir.png" },
            { name: "Витязь", logo: "images/Vityaz.png" },
            { name: "Амур", logo: "images/Amur.png" },
            { name: "Адмирал", logo: "images/Admiral.png" },
            { name: "Барыс", logo: "images/Barys.png" },
            { name: "Куньлунь Ред Стар", logo: "images/Kunlun.png" },
            { name: "Лада", logo: "images/Lada.png" },
            { name: "Сочи", logo: "images/Sochi.png" },
            { name: "Динамо Минск", logo: "images/DynamoMin.png" },
            { name: "Автомобилист", logo: "images/Avto.png" },
        ];

        const API = "";
        const token = localStorage.getItem("token");
        let chatId = localStorage.getItem("chat_id");
        let subscriptions = [];

        async function resolveChatId() {
            if (token) {
                try {
                    const r = await fetch(`${API}/me`, {
                        headers: { "Authorization": `Bearer ${token}` }
                    });
                    if (r.ok) {
                        const user = await r.json();
                        chatId = user.chat_id;
                        localStorage.setItem("chat_id", chatId);
                        return;
                    }
                } catch {}
            }
            if (!chatId) chatId = localStorage.getItem("chat_id");
        }

        async function loadSubscriptions() {
            await resolveChatId();
            if (!chatId) { render(); return; }
            try {
                const r = await fetch(`${API}/subscriptions/${chatId}`, {
                    headers: { "Authorization": `Bearer ${token}` }
                });
                if (!r.ok) { render(); return; }
                const data = await r.json();
                subscriptions = data.subscriptions || [];
                localStorage.setItem("subscriptions", JSON.stringify(subscriptions));
                render();
            } catch { render(); }
        }

        const container = document.getElementById("teamsList");

        function render() {
            container.innerHTML = "";
            khlTeams.forEach(team => {
                const subscribed = subscriptions.some(sub =>
                    sub.toLowerCase() === team.name.toLowerCase()
                );

                const card = document.createElement("div");
                card.className = "subscription-card";

                const infoDiv = document.createElement("div");
                infoDiv.className = "card-info";

                const img = document.createElement("img");
                img.src = team.logo;
                img.alt = team.name;

                const nameSpan = document.createElement("span");
                nameSpan.textContent = team.name;

                infoDiv.appendChild(img);
                infoDiv.appendChild(nameSpan);

                const btn = document.createElement("button");
                btn.className = `btn-small ${subscribed ? 'unsubscribe' : ''}`;
                btn.textContent = subscribed ? 'Отписаться' : 'Подписаться';
                btn.onclick = function() {
                    toggleSubscription(team.name);
                };

                card.appendChild(infoDiv);
                card.appendChild(btn);
                container.appendChild(card);
            });
        }

        function showSubError(msg) {
            const el = document.getElementById('subError');
            el.textContent = msg;
            el.classList.add('visible');
        }

        async function toggleSubscription(team) {
            await resolveChatId();
            if (!chatId) { showSubError("Авторизуйтесь"); return; }
            try {
                const r = await fetch(`${API}/subscription/toggle`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify({ chat_id: parseInt(chatId), team_name: team })
                });
                const result = await r.json();
                if (r.ok) {
                    document.getElementById('subError').classList.remove('visible');
                    await loadSubscriptions();
                } else {
                    const errorData = result.detail || result.message || "Ошибка";
                    if (typeof errorData === "object" && errorData.code === "payment_required") {
                        window.location.href = `billing.html?team=${encodeURIComponent(errorData.team_name || team)}`;
                    } else {
                        showSubError(typeof errorData === "string" ? errorData : "Ошибка");
                    }
                }
            } catch (err) {
                showSubError("Ошибка сети: " + err.message);
            }
        }

        loadSubscriptions();
    </script>
    <button class="btn"
            onclick="window.location.href='main.html'">
        Назад
    </button>

</div>
</body>
</html>
