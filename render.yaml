services:
  - type: web
    name: hockeyscrapper-api
    runtime: docker
    repo: https://github.com/kamillayarullina/hockeyscrapper
    branch: work-v1
    dockerfilePath: ./Dockerfile
    dockerCommand: python -m main --api-only
    healthCheckPath: /stats
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_SERVER
        value: "smtp.gmail.com"
      - key: MAIL_STARTTLS
        value: "True"
      - key: MAIL_SSL_TLS
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: hockeyscrapper-db
          property: connectionString

  - type: worker
    name: hockeyscrapper-bot
    runtime: docker
    repo: https://github.com/kamillayarullina/hockeyscrapper
    branch: work-v1
    dockerfilePath: ./Dockerfile
    dockerCommand: python -m main --bot-only
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: hockeyscrapper-db
          property: connectionString

databases:
  - name: hockeyscrapper-db
    plan: free
    databaseName: hockeyscrapper
    region: frankfurt
