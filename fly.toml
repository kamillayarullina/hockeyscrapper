app = "hockeyscrapper"
primary_region = "ams"

[env]
  DB_PATH = "/data/tickets.db"
  BOT_TOKEN = ""
  ADMIN_CHAT_ID = ""

[http_service]
  internal_port = 8000
  force_https = true

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[processes]
  app = "uvicorn Backend.main:app --host 0.0.0.0 --port 8000"
  bot = "python -m main --bot-only"

[mounts]
  source = "hockeyscrapper_data"
  destination = "/data"
