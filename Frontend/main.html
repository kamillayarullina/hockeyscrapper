<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль</title>
    <link rel="stylesheet" href="style_main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap"
          rel="stylesheet">
</head>
<body>
    <div class="profile-container">

        <h1>Профиль</h1>

        <div class="profile-header">

            <div class="avatar-wrapper">
                <div class="profile-avatar" id="profileAvatar">👤</div>
                <input type="file" id="avatarInput" accept="image/*" hidden>
                <button class="btn-upload" type="button" onclick="document.getElementById('avatarInput').click()">
                    Загрузить фото
                </button>
            </div>

            <div class="profile-info">
                <div class="info-card">
                    <span>Имя пользователя</span>
                    <strong id="profileUsername">—</strong>
                </div>

                <div class="info-card">
                    <span>Почта</span>
                    <strong id="profileEmail">—</strong>
                </div>

                <div class="info-card">
                    <span>Telegram</span>
                    <strong id="profileTelegram">—</strong>
                </div>

                <button class="btn"
                        onclick="window.location.href='sub.html'">
                    Управление подписками
                </button>
                <button class="btn" id="telegramBtn">
                    Привязать Telegram
                </button>
            </div>

        </div>

        <div class="teams-section">

            <h2>Подписки</h2>

            <div class="teams-grid" id="myTeams"></div>

            <div class="crop-modal" id="cropModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:9999;justify-content:center;align-items:center;padding:20px;box-sizing:border-box">
                <div class="crop-modal-content">
                    <h3>Выберите область фото</h3>
                    <div class="crop-viewport" id="cropViewport">
                        <img id="cropImage" alt="">
                        <div class="crop-mask"></div>
                    </div>
                    <div class="crop-controls">
                        <button class="btn-small" id="zoomOut" type="button">−</button>
                        <input type="range" id="zoomRange" min="1" max="3" step="0.01" value="1">
                        <button class="btn-small" id="zoomIn" type="button">+</button>
                    </div>
                    <div class="crop-actions">
                        <button class="btn-small" id="cropCancel" type="button">Отмена</button>
                        <button class="btn-small crop-save" id="cropSave" type="button">Сохранить</button>
                    </div>
                </div>
            </div>

            <script>
                const API = "";

                async function resolveChatId(token) {
                    if (token) {
                        try {
                            const r = await fetch(`${API}/me`, {
                                headers: { "Authorization": `Bearer ${token}` }
                            });
                            if (r.ok) {
                                const user = await r.json();
                                localStorage.setItem("chat_id", user.chat_id);
                                return user;
                            }
                            if (r.status === 404 || r.status === 401) {
                                localStorage.removeItem("token");
                                localStorage.removeItem("chat_id");
                                localStorage.removeItem("user");
                                window.location.href = "vhod/vhod.html";
                                return null;
                            }
                        } catch {}
                    }
                    return null;
                }

                const avatarInput = document.getElementById("avatarInput");
                const cropModal   = document.getElementById("cropModal");
                const cropImage   = document.getElementById("cropImage");
                const cropViewport= document.getElementById("cropViewport");
                const zoomRange   = document.getElementById("zoomRange");
                const zoomIn      = document.getElementById("zoomIn");
                const zoomOut     = document.getElementById("zoomOut");
                const cropSave    = document.getElementById("cropSave");
                const cropCancel  = document.getElementById("cropCancel");
                const profileAvatar = document.getElementById("profileAvatar");

                let cropState = { scale: 1, x: 0, y: 0, dragging: false, startX: 0, startY: 0, lastX: 0, lastY: 0 };

                function loadSavedAvatar() {
                    const saved = localStorage.getItem("avatar");
                    if (saved) {
                        profileAvatar.innerHTML = "";
                        profileAvatar.style.backgroundImage = `url(${saved})`;
                        profileAvatar.style.backgroundSize = "cover";
                        profileAvatar.style.backgroundPosition = "center";
                        profileAvatar.textContent = "";
                    }
                }
                loadSavedAvatar();

                avatarInput.addEventListener("change", (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        cropImage.src = ev.target.result;
                        cropImage.onload = () => {
                            openCropModal();
                        };
                    };
                    reader.readAsDataURL(file);
                    avatarInput.value = ""; 
                });

                function openCropModal() {
                    cropState = { scale: 1, x: 0, y: 0, dragging: false, startX: 0, startY: 0, lastX: 0, lastY: 0 };
                    zoomRange.value = 1;
                    applyCropTransform();
                    cropModal.style.display = "flex";
                }

                function closeCropModal() {
                    cropModal.style.display = "none";
                }

                function applyCropTransform() {
                    cropImage.style.transform = `translate(${cropState.x}px, ${cropState.y}px) scale(${cropState.scale})`;
                }

                cropViewport.addEventListener("mousedown", (e) => {
                    cropState.dragging = true;
                    cropState.startX = e.clientX - cropState.x;
                    cropState.startY = e.clientY - cropState.y;
                    cropImage.style.cursor = "grabbing";
                });
                document.addEventListener("mousemove", (e) => {
                    if (!cropState.dragging) return;
                    cropState.x = e.clientX - cropState.startX;
                    cropState.y = e.clientY - cropState.startY;
                    applyCropTransform();
                });
                document.addEventListener("mouseup", () => {
                    cropState.dragging = false;
                    cropImage.style.cursor = "grab";
                });

                cropViewport.addEventListener("touchstart", (e) => {
                    if (e.touches.length !== 1) return;
                    cropState.dragging = true;
                    cropState.startX = e.touches[0].clientX - cropState.x;
                    cropState.startY = e.touches[0].clientY - cropState.y;
                }, { passive: true });
                cropViewport.addEventListener("touchmove", (e) => {
                    if (!cropState.dragging || e.touches.length !== 1) return;
                    cropState.x = e.touches[0].clientX - cropState.startX;
                    cropState.y = e.touches[0].clientY - cropState.startY;
                    applyCropTransform();
                    e.preventDefault();
                }, { passive: false });
                cropViewport.addEventListener("touchend", () => { cropState.dragging = false; });

                cropViewport.addEventListener("wheel", (e) => {
                    e.preventDefault();
                    const delta = e.deltaY > 0 ? -0.1 : 0.1;
                    cropState.scale = Math.max(1, Math.min(3, cropState.scale + delta));
                    zoomRange.value = cropState.scale;
                    applyCropTransform();
                }, { passive: false });

                zoomRange.addEventListener("input", () => {
                    cropState.scale = parseFloat(zoomRange.value);
                    applyCropTransform();
                });
                zoomIn.addEventListener("click", () => {
                    cropState.scale = Math.min(3, cropState.scale + 0.1);
                    zoomRange.value = cropState.scale;
                    applyCropTransform();
                });
                zoomOut.addEventListener("click", () => {
                    cropState.scale = Math.max(1, cropState.scale - 0.1);
                    zoomRange.value = cropState.scale;
                    applyCropTransform();
                });

                cropCancel.addEventListener("click", closeCropModal);

                cropSave.addEventListener("click", () => {
                    const size = 440;
                    const canvas = document.createElement("canvas");
                    canvas.width = size;
                    canvas.height = size;
                    const ctx = canvas.getContext("2d");

                    ctx.beginPath();
                    ctx.arc(size/2, size/2, size/2, 0, Math.PI * 2);
                    ctx.closePath();
                    ctx.clip();

                    const vpSize = cropViewport.clientWidth;
                    if (vpSize === 0) return;
                    const ratio = size / vpSize;

                    const natW = cropImage.naturalWidth;
                    const natH = cropImage.naturalHeight;

                    const coverScale = Math.max(vpSize / natW, vpSize / natH);
                    const dispW = natW * coverScale;
                    const dispH = natH * coverScale;
                    const elOffX = (vpSize - dispW) / 2;
                    const elOffY = (vpSize - dispH) / 2;

                    const cx = vpSize / 2;
                    const cy = vpSize / 2;
                    const s = cropState.scale;
                    const x = cropState.x;
                    const y = cropState.y;

                
                    const finalX = (elOffX - cx) * s + cx + x;
                    const finalY = (elOffY - cy) * s + cy + y;

                    const finalW = dispW * s;
                    const finalH = dispH * s;

                    const canvasX = finalX * ratio;
                    const canvasY = finalY * ratio;
                    const canvasW = finalW * ratio;
                    const canvasH = finalH * ratio;

                    ctx.drawImage(cropImage, canvasX, canvasY, canvasW, canvasH);

                    const dataUrl = canvas.toDataURL("image/jpeg", 0.92);
                    localStorage.setItem("avatar", dataUrl);

                    profileAvatar.innerHTML = "";
                    profileAvatar.style.backgroundImage = `url(${dataUrl})`;
                    profileAvatar.style.backgroundSize = "cover";
                    profileAvatar.style.backgroundPosition = "center";
                    profileAvatar.textContent = "";

                    const token = localStorage.getItem("token");
                    if (token) {
                        fetch("/upload-avatar", {
                            method: "POST",
                            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
                            body: JSON.stringify({ avatar: dataUrl }),
                        }).catch(() => {});
                    }

                    closeCropModal();
                });

                async function loadProfile() {
                    const token = localStorage.getItem("token");
                    let chatId_ = localStorage.getItem("chat_id");
                    const userFromApi = await resolveChatId(token);
                    if (userFromApi) {
                        chatId_ = userFromApi.chat_id;
                        document.getElementById("profileUsername").textContent = userFromApi.username || "—";
                        document.getElementById("profileEmail").textContent = userFromApi.email || "—";
                        document.getElementById("profileTelegram").textContent = userFromApi.telegram || "—";
                        if (userFromApi.avatar_url) {
                            localStorage.setItem("avatar", userFromApi.avatar_url);
                            profileAvatar.innerHTML = "";
                            profileAvatar.style.backgroundImage = `url(${userFromApi.avatar_url})`;
                            profileAvatar.style.backgroundSize = "cover";
                            profileAvatar.style.backgroundPosition = "center";
                            profileAvatar.textContent = "";
                        }
                    }
                    const tgBtn = document.getElementById("telegramBtn");
                    if (chatId_ && chatId_ > 0) {
                        tgBtn.textContent = "Telegram привязан ✅";
                        tgBtn.disabled = true;
                        tgBtn.style.background = "#4CAF50";
                    } else if (chatId_ && chatId_ < 0) {
                        tgBtn.textContent = "Привязать Telegram";
                        tgBtn.disabled = false;
                        tgBtn.style.background = "";
                        tgBtn.onclick = async function() {
                            tgBtn.textContent = "Генерируем код...";
                            tgBtn.disabled = true;
                            try {
                                const r = await fetch(`${API}/link-code`, {
                                    method: "POST",
                                    headers: { "Content-Type": "application/json" },
                                    body: JSON.stringify({ chat_id: parseInt(chatId_) })
                                });
                                if (r.ok) {
                                    const data = await r.json();
                                    localStorage.setItem("link_code", data.code);
                                    window.open(data.link, "_blank");
                                    tgBtn.textContent = "Код отправлен! Проверьте Telegram";
                                    setTimeout(() => { tgBtn.textContent = "Привязать Telegram"; tgBtn.disabled = false; }, 5000);
                                } else {
                                    const err = await r.json();
                                    alert(err.detail || "Ошибка");
                                    tgBtn.textContent = "Привязать Telegram";
                                    tgBtn.disabled = false;
                                }
                            } catch(e) {
                                alert("Ошибка сети");
                                tgBtn.textContent = "Привязать Telegram";
                                tgBtn.disabled = false;
                            }
                        };
                    } else {
                        tgBtn.style.display = "none";
                    }
                    const user = JSON.parse(localStorage.getItem("user") || "{}");
                    if (!userFromApi && user.username) {
                        document.getElementById("profileUsername").textContent = user.username;
                        document.getElementById("profileEmail").textContent = user.email;
                        document.getElementById("profileTelegram").textContent = user.telegram;
                    }
                }

                const teamLogos = {
                    "цска": "CSKA.png", "спартак": "Spartak.png",
                    "динамо москва": "DinMsk.png", "ска": "SKA.png",
                    "авангард": "Avangard.png", "ак барс": "AkBars.png",
                    "салават юлаев": "Salavat.png", "трактор": "Traktor.png",
                    "металлург": "Metallurg.png", "локомотив": "Lokomotiv.png",
                    "сибирь": "Sibir.png", "торпедо": "Torpedo.png",
                    "лада": "Lada.png", "витязь": "Vityaz.png",
                    "северсталь": "Severstal.png", "нефтехимик": "Neftekhimik.png",
                    "амур": "Amur.png", "адмирал": "Admiral.png",
                    "куньлунь": "Kunlun.png", "барыс": "Barys.png",
                    "динамо минск": "DynamoMin.png", "сочи": "Sochi.png"
                };

                async function loadSubscriptions() {
                    const teamsContainer = document.getElementById("myTeams");
                    const chatId = localStorage.getItem("chat_id");
                    if (!chatId) {
                        teamsContainer.innerHTML = "<p>Авторизуйтесь, чтобы увидеть подписки.</p>";
                        return;
                    }
                    try {
                        const r = await fetch(`${API}/subscriptions/${chatId}`);
                        if (!r.ok) { throw new Error("not ok"); }
                        const data = await r.json();
                        const subs = data.subscriptions || [];
                        if (subs.length === 0) {
                            teamsContainer.innerHTML = "<p>Вы пока не подписаны ни на одну команду.</p>";
                        } else {
                            localStorage.setItem("subscriptions", JSON.stringify(subs));
                            subs.forEach(team => {
                                const logo = teamLogos[team.toLowerCase()] || "";
                                const imgHtml = logo ? `<img src="images/${logo}" style="width:32px;height:32px;object-fit:contain;flex-shrink:0">` : "";
                                teamsContainer.innerHTML += `<div class="team-card" style="gap:10px;overflow:hidden">${imgHtml}<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${team}</span></div>`;
                            });
                        }
                    } catch {
                        teamsContainer.innerHTML = "<p>Ошибка загрузки подписок.</p>";
                    }
                }

                loadProfile().then(loadSubscriptions);
            </script>

        </div>

    </div>
</body>
</html>
