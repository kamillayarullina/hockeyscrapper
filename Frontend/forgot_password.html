<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Восстановление пароля</title>

    <link rel="stylesheet" href="style_pass.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap"
          rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="header__container">
            <nav class="header__nav">
                <img src="images/logo.svg" alt="" class="header__svg">
            </nav>
        </div>
    </header>

<div class="wrapper">

    <form id="forgotForm">

        <h1>Восстановление пароля</h1>

        <p class="description">
            Введите адрес электронной почты.
            Мы отправим код подтверждения.
        </p>

        <div class="input-box">
            <input
                type="email"
                name="email"
                placeholder="E-mail"
                required
            >
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24" >
<path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2m0 2v.51l-8 6.22-8-6.22V6zM4 18V9.04l7.39 5.74c.18.14.4.21.61.21s.43-.07.61-.21L20 9.03v8.96H4Z"></path>
</svg>
        </div>

        <button type="submit" class="btn">
            Отправить код
        </button>

        <div id="message"></div>

        <div class="register-link">
            <p><a href="vhod/vhod.html">
                Вернуться ко входу
            </a></p>
        </div>

    </form>

</div>

<script>
document.getElementById('forgotForm')
.addEventListener('submit', async function(e){

    e.preventDefault();

    const email = this.email.value;
    const msgDiv = document.getElementById('message');
    const btn = this.querySelector('.btn');
    const originalText = btn.textContent;

    btn.disabled = true;
    btn.textContent = 'Отправка...';
    msgDiv.innerHTML = '';

    try {

        const response = await fetch('/forgot_password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });

        const result = await response.json();

        if(response.ok){

            localStorage.setItem(
                'reset_email',
                email
            );

            msgDiv.innerHTML =
                'Код отправлен! Перенаправление...';

            setTimeout(() => {
                window.location.href =
                    '/new_password.html';
            }, 2000);

        } else {
            msgDiv.innerHTML = result.detail || 'Ошибка';
            btn.disabled = false;
            btn.textContent = originalText;
        }

    } catch(err){
        msgDiv.innerHTML = 'Ошибка сети. Проверьте подключение.';
        btn.disabled = false;
        btn.textContent = originalText;
    }

});
</script>

</body>
</html>
