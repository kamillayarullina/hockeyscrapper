<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    <style>
        .form-error {
            color: #c62828;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 12px;
            display: none;
        }
        .form-error.visible { display: block; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header__container">
            <nav class="header__nav">
                <img src="../images/logo.svg" alt="" class="header__svg">
            </nav>
        </div>
    </header>
    <div class="wrapper">
        <form id="loginForm">
            <h1>Вход</h1>
            <div class="form-error" id="loginError"></div>
        <div class="input-box">
            <input type="email" name="email" placeholder="E-mail" required>
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24" >
<path d="M12 12c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5m0-8c1.65 0 3 1.35 3 3s-1.35 3-3 3-3-1.35-3-3 1.35-3 3-3M4 22h16c.55 0 1-.45 1-1v-1c0-3.86-3.14-7-7-7h-4c-3.86 0-7 3.14-7 7v1c0 .55.45 1 1 1m6-7h4c2.76 0 5 2.24 5 5H5c0-2.76 2.24-5 5-5"></path>
</svg>
        </div>
        <div class="input-box">
            <input type="password" name="password" placeholder="Пароль" required>
            <svg class="toggle-password" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24" data-target="password">
<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"></path>
</svg>
        </div>
        <div class="remember">
            <label for=""> <input type="checkbox">Запомни меня</label>
            <a href="../forgot_password.html">Забыл пароль?</a>
        </div>
        <button type="submit" class="btn">Войти</button>
        <div class="register-link">
            <p>Нет аккаунта? <a href="../register/register.html">Зарегистрироваться</a></p>
        </div>
        </form>
    </div>
    <script>
        document.querySelectorAll('.toggle-password').forEach(function(icon) {
            icon.addEventListener('click', function() {
                var input = this.parentElement.querySelector('input');
                if (input.type === 'password') {
                    input.type = 'text';
                    this.innerHTML = '<path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"></path>';
                } else {
                    input.type = 'password';
                    this.innerHTML = '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"></path>';
                }
            });
        });

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: data.email,
                        password: data.password
                    })
                });

                if (response.ok) {
                    const result = await response.json();
                    localStorage.removeItem('avatar');
                    localStorage.removeItem('avatar_url');
                    localStorage.removeItem('subscriptions');
                    localStorage.setItem('user', JSON.stringify(result.user));
                    localStorage.setItem('chat_id', result.user.chat_id);
                    localStorage.setItem('token', result.access_token);

                    window.location.href = '../main.html';
                } else {
                    let msg = 'Неверный логин или пароль';
                    try { const err = await response.json(); msg = err.detail || msg; } catch {}
                    document.getElementById('loginError').textContent = msg;
                    document.getElementById('loginError').classList.add('visible');
                }

            } catch (err) {
                document.getElementById('loginError').textContent = 'Ошибка сети';
                document.getElementById('loginError').classList.add('visible');
            }
        });
    </script>
</body>
</html>
