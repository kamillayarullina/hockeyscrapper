services:
  - type: web
    name: hockeyscrapper-api
    runtime: docker
    repo: https://github.com/kamillayarullina/hockeyscrapper
    branch: main
    dockerfilePath: ./Dockerfile
    dockerCommand: python -m main --api-only
    healthCheckPath: /stats
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: JWT_SECRET_KEY
        sync: true
        value: hockeyscrapper-secret-change-in-production
      - key: DATABASE_URL
        fromDatabase:
          name: hockeyscrapper-db
          property: connectionString

  - type: worker
    name: hockeyscrapper-bot
    runtime: docker
    repo: https://github.com/kamillayarullina/hockeyscrapper
    branch: main
    dockerfilePath: ./Dockerfile
    dockerCommand: python -m main --bot-only
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: hockeyscrapper-db
          property: connectionString

databases:
  - name: hockeyscrapper-db
    plan: free
    databaseName: hockeyscrapper
    region: frankfurt
