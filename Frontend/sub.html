<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подписки</title>
    <link rel="stylesheet" href="style_main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap"
          rel="stylesheet">
    <style>
        #subError {
            color: #c62828;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            margin: 8px 0 16px;
            display: none;
        }
        #subError.visible { display: block; }

        .loading-spinner {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 16px;
        }

        .subscription-card.loading {
            opacity: 0.6;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="profile-container">

    <h1>Управление подписками</h1>

    <div id="subError"></div>
    <div class="subscriptions-grid" id="teamsList"><div class="loading-spinner">Загрузка...</div></div>
    <script>
        const khlTeams = [
            { name: "СКА",  logo: "images/SKA.png" },
            { name: "ЦСКА", logo: "images/CSKA.png" },
            { name: "Ак Барс", logo: "images/AkBars.png" },
            { name: "Динамо Москва", logo: "images/DinMsk.png" },
            { name: "Локомотив", logo: "images/Lokomotiv.png" },
            { name: "Спартак", logo: "images/Spartak.png" },
            { name: "Трактор", logo: "images/Traktor.png" },
            { name: "Авангард", logo: "images/Avangard.png" },
            { name: "Металлург Мг", logo: "images/Metallurg.png" },
            { name: "Салават Юлаев", logo: "images/Salavat.png" },
            { name: "Северсталь", logo: "images/Severstal.png" },
            { name: "Торпедо", logo: "images/Torpedo.png" },
            { name: "Нефтехимик", logo: "images/Neftekhimik.png" },
            { name: "Сибирь", logo: "images/Sibir.png" },
            { name: "Витязь", logo: "images/Vityaz.png" },
            { name: "Амур", logo: "images/Amur.png" },
            { name: "Адмирал", logo: "images/Admiral.png" },
            { name: "Барыс", logo: "images/Barys.png" },
            { name: "Куньлунь Ред Стар", logo: "images/Kunlun.png" },
            { name: "Лада", logo: "images/Lada.png" },
            { name: "Сочи", logo: "images/Sochi.png" },
            { name: "Динамо Минск", logo: "images/DynamoMin.png" },
            { name: "Автомобилист", logo: "images/Avto.png" },
        ];

        const API = "";
        const token = localStorage.getItem("token");
        let chatId = localStorage.getItem("chat_id");

        function normalizeName(name) {
            return name.toLowerCase().trim();
        }

        function getSubscribedSet() {
            try {
                return new Set(JSON.parse(localStorage.getItem("subscriptions") || "[]").map(normalizeName));
            } catch { return new Set(); }
        }

        let subscribedSet = getSubscribedSet();

        const container = document.getElementById("teamsList");

        function render() {
            container.innerHTML = "";
            khlTeams.forEach(team => {
                const normalized = normalizeName(team.name);
                const subscribed = subscribedSet.has(normalized);

                const card = document.createElement("div");
                card.className = "subscription-card";
                card.dataset.team = normalized;

                const infoDiv = document.createElement("div");
                infoDiv.className = "card-info";

                const img = document.createElement("img");
                img.src = team.logo;
                img.alt = team.name;
                img.loading = "lazy";

                const nameSpan = document.createElement("span");
                nameSpan.textContent = team.name;

                infoDiv.appendChild(img);
                infoDiv.appendChild(nameSpan);

                const btn = document.createElement("button");
                btn.className = "btn-small" + (subscribed ? " unsubscribe" : "");
                btn.textContent = subscribed ? "Отписаться" : "Подписаться";
                btn.onclick = function() { toggleSubscription(team.name); };

                card.appendChild(infoDiv);
                card.appendChild(btn);
                container.appendChild(card);
            });
        }

        function updateBtnState(teamName, subscribed) {
            const normalized = normalizeName(teamName);
            const card = container.querySelector(`.subscription-card[data-team="${normalized}"]`);
            if (!card) return;
            const btn = card.querySelector(".btn-small");
            btn.textContent = subscribed ? "Отписаться" : "Подписаться";
            btn.className = "btn-small" + (subscribed ? " unsubscribe" : "");
            card.classList.remove("loading");
        }

        function showSubError(msg) {
            const el = document.getElementById("subError");
            el.textContent = msg;
            el.classList.add("visible");
        }

        function hideSubError() {
            document.getElementById("subError").classList.remove("visible");
        }

        async function resolveChatId() {
            if (token) {
                try {
                    const r = await fetch(`${API}/me`, {
                        headers: { "Authorization": `Bearer ${token}` }
                    });
                    if (r.ok) {
                        const user = await r.json();
                        chatId = user.chat_id;
                        localStorage.setItem("chat_id", chatId);
                        return;
                    }
                } catch {}
            }
            if (!chatId) chatId = localStorage.getItem("chat_id");
        }

        async function loadSubscriptions() {
            const token = localStorage.getItem("token");
            await resolveChatId();
            if (!chatId) return;
            try {
                const r = await fetch(`${API}/subscriptions/${chatId}`, {
                    headers: { "Authorization": `Bearer ${token}` }
                });
                if (!r.ok) return;
                const data = await r.json();
                const subs = data.subscriptions || [];
                localStorage.setItem("subscriptions", JSON.stringify(subs));
                subscribedSet = new Set(subs.map(normalizeName));
                render();
            } catch {}
        }

        async function toggleSubscription(team) {
            const token = localStorage.getItem("token");
            await resolveChatId();
            if (!chatId) { showSubError("Авторизуйтесь"); return; }

            const normalized = normalizeName(team);
            const wasSubscribed = subscribedSet.has(normalized);

            // optimistic update
            if (wasSubscribed) {
                subscribedSet.delete(normalized);
            } else {
                subscribedSet.add(normalized);
            }
            updateBtnState(team, !wasSubscribed);
            hideSubError();

            try {
                const r = await fetch(`${API}/subscription/toggle`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
                    body: JSON.stringify({ chat_id: parseInt(chatId), team_name: team })
                });
                const result = await r.json();
                if (r.ok) {
                    await loadSubscriptions();
                } else if (r.status === 402 && result.detail && result.detail.team_name) {
                    // revert optimistic update
                    if (wasSubscribed) {
                        subscribedSet.add(normalized);
                    } else {
                        subscribedSet.delete(normalized);
                    }
                    updateBtnState(team, wasSubscribed);
                    window.location.href = `billing.html?team=${encodeURIComponent(result.detail.team_name)}`;
                } else {
                    // revert
                    if (wasSubscribed) {
                        subscribedSet.add(normalized);
                    } else {
                        subscribedSet.delete(normalized);
                    }
                    updateBtnState(team, wasSubscribed);
                    showSubError((result.detail && result.detail.message) || result.message || "Ошибка");
                }
            } catch (err) {
                // revert
                if (wasSubscribed) {
                    subscribedSet.add(normalized);
                } else {
                    subscribedSet.delete(normalized);
                }
                updateBtnState(team, wasSubscribed);
                showSubError("Ошибка сети: " + err.message);
            }
        }

        render();
        loadSubscriptions();
    </script>
    <button class="btn"
            onclick="window.location.href='main.html'">
        Назад
    </button>

</div>
</body>
</html>
